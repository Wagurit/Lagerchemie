* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

.header {

}
.logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: 1px; color: #fff; }
.logo span { color: #bae6fd; font-weight: 400; }
.logo-ver { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 400; color: #7dd3fc; background: rgba(0,0,0,0.2); border-radius: 4px; padding: 2px 6px; margin-left: 4px; letter-spacing: 0.5px; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; margin-left: auto; flex-shrink: 0; }
.sync-dot.syncing { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; animation: pulse 1s infinite; }
.sync-dot.error { background: #f87171; box-shadow: 0 0 6px #f87171; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.tabs {
  position: fixed; top: var(--header-h); left: 0; right: 0; z-index: 190;
  height: var(--tabs-h); background: var(--surface);
  border-bottom: 1px solid var(--surface2);
  display: flex; overflow-x: auto; scrollbar-width: none; align-items: stretch;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {

  padding: 0 16px; font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 14px; letter-spacing: 0.5px; color: #bae6fd;
  border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap;
  transition: all .15s; border: none; background: none;
}
.tab:hover { color: #fff; }
.tab.active { color: #fff; border-bottom-color: #fff; }
.tab-badge {
  display: inline-flex; align-items: center; justify-content: center;

.scroll-area { position: fixed; top: calc(var(--header-h) + var(--tabs-h)); bottom: 0; left: 0; right: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.view { display: none; padding: 12px 12px 100px; }

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js?v=28').then(reg => {
        setInterval(() => reg.update(), 60 * 60 * 1000);
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) showUpdateBanner();
          });
        });
      });
    });
    navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
  }
  function showUpdateBanner() { const b = document.getElementById('updateBanner'); if (b) b.style.display = 'flex'; }

  (function() {
    let startY = 0, pulling = false, indicator = null;
    function getInd() {
      if (!indicator) {
        indicator = document.createElement('div');
        indicator.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:8000;background:#0369a1;color:#fff;text-align:center;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:13px;letter-spacing:0.5px;padding:10px;transform:translateY(-100%);transition:transform 0.15s;';
        document.body.appendChild(indicator);
      }
      return indicator;
    }
    document.addEventListener('touchstart', e => { const sa = document.querySelector('.scroll-area'); if (sa && sa.scrollTop === 0) { startY = e.touches[0].clientY; pulling = true; } }, { passive: true });
    document.addEventListener('touchmove', e => {
      if (!pulling) return;
      const dy = e.touches[0].clientY - startY;
      if (dy > 10) { const ind = getInd(); const pct = Math.min(dy/80,1); ind.style.transform = `translateY(${(pct-1)*100}%)`; ind.textContent = pct>=1 ? '↑ Loslassen zum Aktualisieren' : '↓ Zum Aktualisieren ziehen'; }
    }, { passive: true });
    document.addEventListener('touchend', e => {
      if (!pulling) return; pulling = false;
      const dy = e.changedTouches[0].clientY - startY;
      const ind = getInd(); ind.style.transform = 'translateY(-100%)';
      if (dy > 80) { ind.textContent = '🔄 Aktualisiere…'; ind.style.transform = 'translateY(0)'; setTimeout(() => location.reload(), 400); }
    }, { passive: true });
  })();
</script>

<script>
// ══════════════════════════════════════════════════════════
// API HELPER
// ══════════════════════════════════════════════════════════
// ── Token-Refresh-Lock: verhindert parallele Refresh-Calls ──
let _refreshPromise = null;

async function refreshTokenIfNeeded() {
  // Wenn schon ein Refresh läuft, auf denselben warten
  if (_refreshPromise) return _refreshPromise;
  _refreshPromise = (async () => {
    const refresh = localStorage.getItem('lager_refresh');
    if (!refresh) throw new Error('Kein Refresh-Token — bitte neu anmelden.');
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: refresh })
    });
    const data = await r.json();
    if (!r.ok) throw new Error('Session abgelaufen — bitte neu anmelden.');
    authToken = data.access_token;
    localStorage.setItem('lager_token', authToken);
    localStorage.setItem('lager_refresh', data.refresh_token);
    localStorage.setItem('lager_token_exp', Date.now() + (data.expires_in * 1000));
  })();
  try { await _refreshPromise; } finally { _refreshPromise = null; }
}

// Prüft ob ein Response-Body ein JWT-Expired-Fehler ist
function isJwtExpired(bodyText) {
  try { const j = JSON.parse(bodyText); return j.code === 'PGRST303' || j.message?.toLowerCase().includes('jwt expired') || j.error === 'invalid_token'; }
  catch(e) { return bodyText.includes('JWT expired') || bodyText.includes('PGRST303'); }
}

const api = {
  h() { return { apikey: SUPABASE_KEY, Authorization: `Bearer ${authToken || SUPABASE_KEY}`, 'Content-Type': 'application/json' }; },

  // Führt einen fetch aus; bei JWT-Fehler einmal Token refreshen und retry
  async _fetch(url, opts, retried = false) {
    const r = await fetch(url, { ...opts, headers: { ...this.h(), ...(opts.extraHeaders||{}) } });
    if (!r.ok) {
      const body = await r.text();
      if (!retried && isJwtExpired(body)) {
        try {
          await refreshTokenIfNeeded();
          return this._fetch(url, opts, true); // einmaliger Retry mit neuem Token
        } catch(refreshErr) {
          doLogout(); // Refresh fehlgeschlagen → neu anmelden
          throw new Error('Session abgelaufen. Bitte neu anmelden.');
        }
      }
      throw new Error(body);
    }
    return r;
  },

  async get(table, qs='') {
    const r = await this._fetch(`${SUPABASE_URL}/rest/v1/${table}?${qs}`, {});
    return r.json();
  },
  async post(table, data) {
    const r = await this._fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method:'POST', extraHeaders:{ Prefer:'return=representation' }, body: JSON.stringify(data)
    });
    return r.json();
  },
  async patch(table, filter, data) {
    await this._fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`, {
      method:'PATCH', extraHeaders:{ Prefer:'return=minimal' }, body: JSON.stringify(data)
    });
  },
  async delete(table, filter) {
    await this._fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`, { method:'DELETE' });
  },
  async upsert(table, data) {
    const check = await this._fetch(`${SUPABASE_URL}/rest/v1/${table}?produkt_id=eq.${data.produkt_id}&lagerort=eq.${data.lagerort}`, {});
    const existing = await check.json();
    if (existing && existing.length > 0) {
      await this._fetch(`${SUPABASE_URL}/rest/v1/${table}?produkt_id=eq.${data.produkt_id}&lagerort=eq.${data.lagerort}`, {
        method:'PATCH', extraHeaders:{ Prefer:'return=minimal' }, body: JSON.stringify(data)
      });
    } else {
      await this._fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
        method:'POST', extraHeaders:{ Prefer:'return=minimal' }, body: JSON.stringify(data)
      });
    }
  }
};

// ══════════════════════════════════════════════════════════
// DATUM HELFER
// ══════════════════════════════════════════════════════════
function fmtDatum(isoStr) {
  if (!isoStr) return '–';
  return new Date(isoStr).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function fmtDatumKurz(isoStr) {
  if (!isoStr) return '–';
  return new Date(isoStr).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'});
}
const norm = s => s.toLowerCase().replace(/[\s\-\._]/g,'');
// Produkt in Paketen statt kg anzeigen? (reine Display-Umschaltung, siehe PAKET_ANZEIGE)
function zeigtPakete(name){ const n = norm(name); return PAKET_ANZEIGE.some(x => n.includes(norm(x))); }

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let produkte = [], bestaende = [], buchungen = [], userKuerzel = [], lsAustraege = [], kunden = [], lsBestaende = [], bestellnotizen = [];
let aktFilter = 'alle';
let meinKuerzel = '';
let meineUserId = null;

// ══════════════════════════════════════════════════════════
// BESTELLNOTIZEN HELFER
// ══════════════════════════════════════════════════════════

// Alle Gebinde (produkt_id-Ebene) unter 50% ihres eigenen Richtwerts.
// Basis für Badge, Übersicht-Zähler und Nachbestellen-Liste — alles pro Gebinde.
function niedrigeGebinde() {
  return produkte.filter(p => {
    const rw = richtwertProd(p.id);
    return rw && (getMenge(p.id,'Garage') + getMenge(p.id,'Werkstatt')) < rw * 0.5;
  });
}

// Aktive Bestellnotiz PRO GEBINDE (produkt_id) —
// nur wenn sie NACH dem letzten Eingang dieses Gebindes erstellt wurde.
// Notizen kommen aus dem separaten bestellnotizen-Array (unabhängig vom Log-Limit),
// der letzte Eingang aus buchungen.
function getAktiveBestellnotiz(pid) {
  const letzterEingang = buchungen.find(b =>
    b.produkt_id === pid &&
    Number(b.menge_kg) > 0 &&
    !(b.notiz && b.notiz.startsWith(BESTELL_PREFIX))
  );
  const letzteNotiz = bestellnotizen.find(b => b.produkt_id === pid);

  if (!letzteNotiz) return null;
  if (!letzterEingang) return letzteNotiz;

  const tNotiz = new Date(letzteNotiz.erstellt_am).getTime();
  const tEingang = new Date(letzterEingang.erstellt_am).getTime();
  return tNotiz > tEingang ? letzteNotiz : null;
}

async function speichereBestellnotiz(pid, sid) {
  const inp = document.getElementById(sid);
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) { toast('⚠️ Bitte Text eingeben'); return; }
  if (!pid) return;

  sync('syncing');
  try {
    const res = await api.post('lager_buchungen', {
      produkt_id: pid,
      lagerort: null,
      menge_kg: 0,
      notiz: BESTELL_PREFIX + text,
      kuerzel: meinKuerzel || null
    });
    bestellnotizen.unshift(res[0]);
    inp.value = '';
    sync('ok');
    renderUebersicht();
    renderLog();
    toast('🗒️ Bestellnotiz gespeichert — für alle sichtbar');
  } catch(e) { sync('error'); toast('❌ ' + e.message); }
}

async function loescheBestellnotiz(buchungId) {
  if (!confirm('Bestellnotiz wirklich löschen?')) return;
  sync('syncing');
  try {
    await api.delete('lager_buchungen', `id=eq.${buchungId}`);
    bestellnotizen = bestellnotizen.filter(b => b.id !== buchungId);
    buchungen = buchungen.filter(b => b.id !== buchungId);
    sync('ok');
    renderUebersicht();
    renderLog();
    toast('🗑️ Bestellnotiz gelöscht');
  } catch(e) { sync('error'); toast('❌ ' + e.message); }
}

// ══════════════════════════════════════════════════════════
// TAB BADGE
// ══════════════════════════════════════════════════════════
function updateUebersichtBadge() {
  const anzahl = niedrigeGebinde().length;
  const tab = document.getElementById('tab-uebersicht');
  if (!tab) return;
  const old = tab.querySelector('.tab-badge');
  if (old) old.remove();
  if (anzahl > 0) {
    const badge = document.createElement('span');
    badge.className = 'tab-badge';
    badge.textContent = anzahl;
    tab.appendChild(badge);
  }
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
async function init() {
  sync('syncing');
  try {
    try { const payload = JSON.parse(atob(authToken.split('.')[1])); meineUserId = payload.sub; } catch(e) {}
    [produkte, bestaende, buchungen, userKuerzel, lsAustraege, kunden, lsBestaende, bestellnotizen] = await Promise.all([
      api.get('lager_produkte','order=name.asc,gebinde_kg.desc'),
      api.get('lager_bestand','order=lagerort.asc'),
      api.get('lager_buchungen','order=erstellt_am.desc&limit=500'),
      api.get('lager_user_kuerzel','order=kuerzel.asc'),
      api.get('lager_ls_austrag','order=erstellt_am.desc&limit=300'),
      api.get('lager_kunden','order=name.asc'),
      api.get('lager_ls_bestand','order=produkt_id.asc'),
      // Bestellnotizen getrennt laden (menge_kg=0) — unabhängig vom 500er-Log-Fenster,
      // damit aktive Notizen nie aus dem Blickfeld fallen
      api.get('lager_buchungen','menge_kg=eq.0&order=erstellt_am.desc&limit=1000')
    ]);
    const meins = userKuerzel.find(u => u.user_id === meineUserId);
    meinKuerzel = meins ? meins.kuerzel : '';
    sync('ok');
    renderProdukte(); renderUebersicht(); renderLog(); renderVerwaltung(); renderLS(); renderDifferenz(); renderHilfe();
    updateUebersichtBadge();
  } catch(e) { sync('error'); toast('❌ Verbindungsfehler: ' + e.message); }
}

function sync(s) { const d = document.getElementById('syncDot'); d.className = 'sync-dot' + (s !== 'ok' ? ' ' + s : ''); }

// ══════════════════════════════════════════════════════════
// TABS / FILTER
// ══════════════════════════════════════════════════════════
// Welcher Tab ist gerade aktiv
let aktTab = 'produkte';

// Daten im Hintergrund neu laden und aktiven Tab neu rendern
// Verhindert doppelten Refresh wenn bereits einer läuft
let _refreshing = false;
let _refreshPending = false;
async function refreshData() {
  // Läuft schon ein Refresh? Wunsch NICHT verwerfen, sondern vormerken —
  // sonst zeigt ein Tab-Wechsel mitten im Fetch veraltete Daten (erst der 2. Tipp half).
  if (_refreshing) { _refreshPending = true; return; }
  _refreshing = true;
  sync('syncing');
  try {
    do {
      _refreshPending = false;
      [produkte, bestaende, buchungen, userKuerzel, lsAustraege, kunden, lsBestaende, bestellnotizen] = await Promise.all([
        api.get('lager_produkte','order=name.asc,gebinde_kg.desc'),
        api.get('lager_bestand','order=lagerort.asc'),
        api.get('lager_buchungen','order=erstellt_am.desc&limit=500'),
        api.get('lager_user_kuerzel','order=kuerzel.asc'),
        api.get('lager_ls_austrag','order=erstellt_am.desc&limit=300'),
        api.get('lager_kunden','order=name.asc'),
        api.get('lager_ls_bestand','order=produkt_id.asc'),
        api.get('lager_buchungen','menge_kg=eq.0&order=erstellt_am.desc&limit=1000')
      ]);
      // Eigenes Kürzel aktualisieren
      const meins = userKuerzel.find(u => u.user_id === meineUserId);
      meinKuerzel = meins ? meins.kuerzel : '';
      // IMMER den aktuell sichtbaren Tab rendern (aktTab kann sich mid-fetch geändert haben)
      renderTabById(aktTab);
      updateUebersichtBadge();
    } while (_refreshPending); // Tab-Wechsel während des Fetches → sofort frisch nachladen
    sync('ok');
  } catch(e) {
    sync('error');
    toast('❌ Aktualisierung fehlgeschlagen: ' + e.message);
  } finally {
    _refreshing = false;
  }
}

function renderTabById(id) {
  if (id === 'produkte')    renderProdukte();
  else if (id === 'uebersicht') renderUebersicht();
  else if (id === 'log')    renderLog();
  else if (id === 'verwaltung') renderVerwaltung();
  else if (id === 'ls')     renderLS();
  else if (id === 'differenz')  renderDifferenz();
  else if (id === 'hilfe')  renderHilfe();
}

function setTab(id, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  btn.classList.add('active');
  aktTab = id;
  // Sofort mit aktuellem lokalem Stand rendern (Wechsel wirkt nie „leer"),
  // dann frisch aus Supabase nachziehen.
  renderTabById(id);
  refreshData();
}
function setFilter(f, btn) {
  aktFilter = f;
  document.querySelectorAll('.fpill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderProdukte();
}

// ══════════════════════════════════════════════════════════
// HELFER
// ══════════════════════════════════════════════════════════
const iqq = s => s.replace(/[\s\/\.]/g,'_');
function getMenge(pid, lo) { const b = bestaende.find(b => b.produkt_id === pid && b.lagerort === lo); return b ? Number(b.menge_kg) : 0; }
function uniqueNames() { return [...new Set(produkte.map(p => p.name))]; }
function prodsFor(name) { return produkte.filter(p => p.name === name); }
function gesamtKg(name) { const ids = prodsFor(name).map(p => p.id); return bestaende.filter(b => ids.includes(b.produkt_id)).reduce((s,b) => s + Number(b.menge_kg), 0); }
function richtwert(name) { const sum = prodsFor(name).reduce((s,p) => s + (Number(p.richtwert_kg)||0), 0); return sum > 0 ? sum : null; }
function richtwertProd(pid) { const p = produkte.find(p => p.id === pid); return p && p.richtwert_kg ? Number(p.richtwert_kg) : null; }
function loKg(name, lo) { const ids = prodsFor(name).map(p => p.id); return bestaende.filter(b => ids.includes(b.produkt_id) && b.lagerort === lo).reduce((s,b) => s + Number(b.menge_kg), 0); }
function getLsBestand(pid) { const b = lsBestaende.find(b => b.produkt_id === pid); return b ? Number(b.menge_kg) : null; }
function getLsBestandName(name) { const ids = prodsFor(name).map(p => p.id); const e = lsBestaende.filter(b => ids.includes(b.produkt_id)); if (!e.length) return null; return e.reduce((s,b) => s + Number(b.menge_kg), 0); }

// ══════════════════════════════════════════════════════════
// BUCHEN
// ══════════════════════════════════════════════════════════
async function buchen(pid, lo, delta, notiz='') {
  const alt = getMenge(pid, lo);
  // Über-Entnahme hart blockieren statt still auf 0 zu clampen (sonst lügt das Log)
  if (Number(delta) < 0 && alt + Number(delta) < 0) {
    const pname = produkte.find(p => p.id===pid)?.name||'';
    toast(`⛔ Nur ${alt} kg in ${lo} — Entnahme von ${Math.abs(delta)} kg nicht möglich (${pname})`);
    return false;
  }
  sync('syncing');
  try {
    const neu = alt + Number(delta);
    await api.upsert('lager_bestand', { produkt_id: pid, lagerort: lo, menge_kg: neu, aktualisiert_am: new Date().toISOString() });
    const bres = await api.post('lager_buchungen', { produkt_id: pid, lagerort: lo, menge_kg: delta, notiz: notiz||null, kuerzel: meinKuerzel||null });
    const idx = bestaende.findIndex(b => b.produkt_id===pid && b.lagerort===lo);
    if (idx>=0) bestaende[idx].menge_kg = neu; else bestaende.push({ produkt_id:pid, lagerort:lo, menge_kg:neu });
    buchungen.unshift(bres && bres[0] ? bres[0] : { produkt_id:pid, lagerort:lo, menge_kg:delta, notiz, kuerzel:meinKuerzel||null, erstellt_am:new Date().toISOString() });
    sync('ok');
    renderProdukte(); renderUebersicht(); renderLog();
    updateUebersichtBadge();
    const pname = produkte.find(p => p.id===pid)?.name||'';
    toast(`${delta>0?'➕':'➖'} ${Math.abs(delta)} kg · ${pname} · ${lo}`);
    return true;
  } catch(e) { sync('error'); toast('❌ ' + e.message); return false; }
}

// ══════════════════════════════════════════════════════════
// RENDER PRODUKTE
// ══════════════════════════════════════════════════════════
function renderProdukte() {
  const raw = document.getElementById('searchInput').value.trim();
  const el = document.getElementById('produktListe');
  const scrollEl = document.querySelector('.scroll-area');
  const scrollTop = scrollEl ? scrollEl.scrollTop : 0;
  const offene = [...document.querySelectorAll('.pc.open')].map(c => c.id);
  const q = norm(raw);

  const names = uniqueNames().filter(name => {
    if (q && !norm(name).includes(q)) return false;
    if (aktFilter === 'garage') return loKg(name,'Garage') > 0;
    if (aktFilter === 'werkstatt') return loKg(name,'Werkstatt') > 0;
    if (aktFilter === 'niedrig') return prodsFor(name).some(p => { const rw = richtwertProd(p.id); return rw && (getMenge(p.id,'Garage')+getMenge(p.id,'Werkstatt')) < rw*0.5; });
    return true;
  });

  if (!names.length) { el.innerHTML='<div class="empty">Keine Produkte gefunden</div>'; return; }

  el.innerHTML = names.map(name => {
    const gkg = gesamtKg(name), rw = richtwert(name);
    // Kartenrand pro Gebinde: rot sobald ein Gebinde <30%, orange sobald eins <50%
    const gebPct = p => { const r = richtwertProd(p.id); return r ? (getMenge(p.id,'Garage')+getMenge(p.id,'Werkstatt'))/r : 1; };
    const anyLow30 = prodsFor(name).some(p => gebPct(p) < 0.3);
    const anyLow50 = prodsFor(name).some(p => gebPct(p) < 0.5);
    const barCls = anyLow30 ? 'bl' : anyLow50 ? 'bw' : '';
    const cardCls = anyLow30 ? 'pc-low' : anyLow50 ? 'pc-warn' : '';
    const pakete = zeigtPakete(name); // Display in Paketen statt kg (nur konfigurierte Produkte)
    const pkgTxt = (kg,gb) => { if(!gb) return '–'; const v=kg/gb; return Number.isInteger(v)?String(v):v.toFixed(1); };
    const chips = prodsFor(name).flatMap(p => ['Garage','Werkstatt'].map(lo => {
      const kg = getMenge(p.id, lo); if (!kg) return '';
      const rwP = richtwertProd(p.id);
      const wert = pakete ? `<strong>${pkgTxt(kg,p.gebinde_kg)} Pkg</strong>` : `<strong>${kg}kg</strong>`;
      return `<span class="lchip ${lo.toLowerCase()}"><span class="lchip-dot"></span>${lo==='Garage'?'🔵':'🟡'} <span style="opacity:0.5;font-size:10px;">${p.gebinde_kg}kg</span> ${wert}${rwP?` · <span style="opacity:0.5;font-size:10px;">RW ${rwP}kg</span>`:''}</span>`;
    })).join('');
    const rows = prodsFor(name).flatMap(p => ['Garage','Werkstatt'].map(lo => {
      const kg = getMenge(p.id, lo), kan = p.gebinde_kg ? (kg/p.gebinde_kg).toFixed(1) : '–';
      const sid = `${iqq(p.id)}_${lo}`;
      const mengeDisplay = pakete
        ? `<div class="menge-display"><div class="menge-kg">${pkgTxt(kg,p.gebinde_kg)} <span style="font-size:14px;color:var(--muted)">Pkg</span></div><div class="menge-sub">${kg} kg · à ${p.gebinde_kg} kg/Paket</div></div>`
        : `<div class="menge-display"><div class="menge-kg">${kg} <span style="font-size:14px;color:var(--muted)">kg</span></div><div class="menge-sub">${kan} Gebinde à ${p.gebinde_kg} kg</div></div>`;
      return `<div class="gebinde-row">

        <div class="gebinde-mid">

          <input type="number" class="manual-inp" id="m_${sid}" placeholder="Gebinde" step="1" min="0" style="text-align:center;">
          <input type="text" class="note-inp" id="n_${sid}" placeholder="Notiz (Kunde…)">
          <button class="btn-ok" onclick="mb('${p.id}','${lo}','${sid}',${p.gebinde_kg})">OK</button>
        </div>
      </div>`;
    })).join('');
    return `<div class="pc ${cardCls}" id="pc_${iqq(name)}">
      <div class="pc-bar ${barCls}"></div>
      <div class="pc-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="pc-name">${name}</div>
        <div><div class="pc-total-kg">${gkg} kg</div>${rw?`<div class="pc-total-rw">Richtwert: ${rw} kg</div>`:''}</div>
        <span class="chev">▼</span>
      </div>
      <div class="chip-row">${chips||'<span style="font-size:12px;color:#94a3b8">Noch kein Bestand – nur über Verwaltung einbuchen</span>'}</div>
      <div class="pc-detail">${rows}</div>
    </div>`;
  }).join('');

  setTimeout(() => {
    offene.forEach(id => { const c = document.getElementById(id); if (c) c.classList.add('open'); });
    if (scrollEl) scrollEl.scrollTop = scrollTop;
  }, 0);
}

async function qb(pid,lo,delta,e) { e.stopPropagation(); await buchen(pid,lo,delta); }
function toggleSign(sid) {
  const btn = document.getElementById('sign_'+sid); if (!btn) return;
  if (btn.textContent==='−') { btn.textContent='+'; btn.style.background='#f0fdf4'; btn.style.borderColor='#86efac'; btn.style.color='#15803d'; }
  else { btn.textContent='−'; btn.style.background='#fef2f2'; btn.style.borderColor='#fca5a5'; btn.style.color='#b91c1c'; }
}
async function mb(pid,lo,sid,gebinde) {
  const inp=document.getElementById('m_'+sid), noteInp=document.getElementById('n_'+sid), signBtn=document.getElementById('sign_'+sid);
  const anzahl=parseFloat(inp.value);
  if(isNaN(anzahl)||anzahl<=0){toast('⚠️ Bitte Anzahl Gebinde eingeben');return;}
  const deltaKg=((!signBtn||signBtn.textContent==='−')?-1:1)*anzahl*gebinde;
  const notiz=noteInp?.value.trim()||'';
  const ok=await buchen(pid,lo,deltaKg,notiz);
  if(ok!==false){ inp.value=''; if(noteInp) noteInp.value=''; } // nur bei Erfolg leeren
}

  } else {

    <div class="sl">Status</div>

function renderLog(filterQ='') {
  const el = document.getElementById('logContent');
  let alleBuchungen = [
    ...buchungen.map(b => ({ ...b, _typ: 'AD' })),
    ...lsAustraege.map(ls => ({ ...ls, _typ: 'LS', lagerort: 'LS', menge_kg: ls.menge_kg }))
  ].sort((a,b) => new Date(b.erstellt_am) - new Date(a.erstellt_am));

  if (filterQ) {
    const q = norm(filterQ);
    alleBuchungen = alleBuchungen.filter(b => {
      const p = produkte.find(p => p.id === b.produkt_id);
      return norm(p?p.name:'').includes(q) || (b.kuerzel||'').toLowerCase().includes(q) || norm(b.kunde||'').includes(q) || norm(b.notiz||'').includes(q);
    });
  }
  alleBuchungen = alleBuchungen.slice(0, 300);

  const searchBar = `<div style="position:relative;margin:12px 0 10px;"><span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;">🔍</span><input type="search" class="search-input" id="logSuche" value="${filterQ}" oninput="renderLog(this.value)" placeholder="Produkt, Kürzel, Notiz…" data-focus="1"></div>`;

  if (!alleBuchungen.length) { el.innerHTML = searchBar + '<div class="empty">Keine Einträge gefunden</div>'; return; }

  el.innerHTML = searchBar + '<div>' + alleBuchungen.map(b => {
    const p = produkte.find(p => p.id === b.produkt_id);
    const menge = Number(b.menge_kg);
    const istNotiz = b._typ === 'AD' && b.notiz && b.notiz.startsWith(BESTELL_PREFIX);
    const istLS = b._typ === 'LS';
    const pos = menge > 0;

    let signHtml, signClass, lortStyle, lortLabel, lortClass;
    if (istNotiz) {
      signHtml = '🗒️<br><span style="font-size:9px;">Notiz</span>';
      signClass = 'note';
      lortLabel = 'Bestellnotiz'; lortClass = 'notiz'; lortStyle = '';
    } else if (istLS) {
      signHtml = `${pos?'+':''}${menge}<br><span style="font-size:10px;color:var(--muted)">kg</span>`;
      signClass = pos ? 'pos' : 'neg';
      lortLabel = 'LS'; lortClass = ''; lortStyle = 'background:#fffbeb;color:#b45309;border:none;';
    } else {
      signHtml = `${pos?'+':''}${menge}<br><span style="font-size:10px;color:var(--muted)">kg</span>`;
      signClass = pos ? 'pos' : 'neg';
      lortLabel = b.lagerort||''; lortClass = b.lagerort ? b.lagerort.toLowerCase() : ''; lortStyle = '';
    }

    const notizAnzeige = istNotiz
      ? b.notiz.replace(BESTELL_PREFIX,'')
      : (!istLS && b.notiz ? ' · ' + b.notiz : '');
    const lsDat = istLS && b.ls_datum ? ' · LS: ' + fmtDatumKurz(b.ls_datum) : '';
    const kundeInfo = istLS && b.kunde ? ' · ' + b.kunde : '';

    return `<div class="log-item" style="${istLS?'border-color:#fcd34d;':''} ${istNotiz?'border-color:#c4b5fd;background:#faf5ff;':''}">
      <div class="log-sign ${signClass}">${signHtml}</div>
      <div class="log-info">
        <div class="log-prod">${p?p.name:'–'} <span class="lort-sm ${lortClass}" style="${lortStyle}">${lortLabel}</span></div>
        <div class="log-meta">${fmtDatum(b.erstellt_am)}${b.kuerzel?' · <strong>'+b.kuerzel+'</strong>':''}${kundeInfo}${lsDat}${notizAnzeige?(' · '+notizAnzeige):''}</div>
      </div>
    </div>`;
  }).join('') + '</div>';

  setTimeout(() => { const sf = document.getElementById('logSuche'); if (sf && filterQ) { sf.focus(); sf.setSelectionRange(sf.value.length, sf.value.length); } }, 0);
}

function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2500); }

  if(!name||!geb){toast('⚠️ Name und Gebindegröße erforderlich');return;}
  sync('syncing');
  try {
    const res=await api.post('lager_produkte',{name,gebinde_kg:geb,richtwert_kg:rw});
    const np=res[0]; produkte.push(np); produkte.sort((a,b)=>a.name.localeCompare(b.name));
    if(start&&start>0){
      await api.upsert('lager_bestand',{produkt_id:np.id,lagerort:'Garage',menge_kg:start,aktualisiert_am:new Date().toISOString()});
      const bres=await api.post('lager_buchungen',{produkt_id:np.id,lagerort:'Garage',menge_kg:start,notiz:'Inventur/Start',kuerzel:meinKuerzel||null});
      bestaende.push({produkt_id:np.id,lagerort:'Garage',menge_kg:start});
      buchungen.unshift(bres[0]);
      await lsBestandSetzen(np.id,start);
    }
    sync('ok');
    ['neu-name','neu-gebinde','neu-richtwert','neu-startmenge'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    renderProdukte();renderUebersicht();renderVerwaltung();renderLS();renderDifferenz();updateUebersichtBadge();
    toast('✅ '+name+(start?` — ${start} kg in Garage`:' angelegt'));
  }catch(e){sync('error');toast('❌ '+e.message);}
}

function bestaetigeSet(pid, lo, vsid) {
  const val=parseFloat(document.getElementById('ist_'+vsid)?.value);
  if(isNaN(val)||val<0){toast('⚠️ Bitte gültigen kg-Wert eingeben');return;}
  const pname=produkte.find(p=>p.id===pid)?.name||'';
  if(!confirm(`Lagerbestand wirklich überschreiben?\n\n${pname} · ${lo}\nNeuer Wert: ${val} kg\n\nSetzt Lager UND LS-Bestand neu.`)) return;
  setzeIstBestand(pid,lo,vsid);
}
async function setzeIstBestand(pid, lo, vsid) {
  const val=parseFloat(document.getElementById('ist_'+vsid)?.value);
  if(isNaN(val)||val<0) return;
  sync('syncing');
  try {
    const alt=getMenge(pid,lo), delta=val-alt;
    await api.upsert('lager_bestand',{produkt_id:pid,lagerort:lo,menge_kg:val,aktualisiert_am:new Date().toISOString()});
    if(delta!==0){
      const bres=await api.post('lager_buchungen',{produkt_id:pid,lagerort:lo,menge_kg:delta,notiz:'Inventur/Korrektur',kuerzel:meinKuerzel||null});
      buchungen.unshift(bres[0]);
    }
    const bidx=bestaende.findIndex(b=>b.produkt_id===pid&&b.lagerort===lo);
    if(bidx>=0) bestaende[bidx].menge_kg=val; else bestaende.push({produkt_id:pid,lagerort:lo,menge_kg:val});
    const pname=produkte.find(p=>p.id===pid)?.name||'';
    for(const prod of prodsFor(pname)){
      const adGesamt=['Garage','Werkstatt'].reduce((s,l)=>s+(prod.id===pid&&l===lo?val:getMenge(prod.id,l)),0);
      await lsBestandSetzen(prod.id,adGesamt);
    }
    document.getElementById('ist_'+vsid).value='';
    sync('ok'); renderVerwaltung(document.getElementById('verwaltungSuche')?.value||''); renderProdukte();renderUebersicht();renderLog();renderDifferenz();updateUebersichtBadge();
    toast(`✅ Inventur ${pname}: ${val} kg`);
  }catch(e){sync('error');toast('❌ '+e.message);}
}
async function lsBestandSetzen(pid, val) {
  const check = await api._fetch(`${SUPABASE_URL}/rest/v1/lager_ls_bestand?produkt_id=eq.${pid}`, {});
  const existing = await check.json();
  if (existing && existing.length > 0) {
    await api.patch('lager_ls_bestand', `produkt_id=eq.${pid}`, { menge_kg: val, aktualisiert_am: new Date().toISOString() });
  } else {
    await api._fetch(`${SUPABASE_URL}/rest/v1/lager_ls_bestand`, {
      method: 'POST', extraHeaders: { Prefer: 'return=minimal' }, body: JSON.stringify({ produkt_id: pid, menge_kg: val })
    });
  }
  const idx=lsBestaende.findIndex(b=>b.produkt_id===pid);
  if(idx>=0) lsBestaende[idx].menge_kg=val; else lsBestaende.push({produkt_id:pid,menge_kg:val});
}
async function eintragEingang(pid, menge, zielLo='Garage', lsNr='') {
  const notiz=lsNr?`Eingang/Anlieferung · LS: ${lsNr}`:'Eingang/Anlieferung';
  const neuerAD=getMenge(pid,zielLo)+menge;
  await api.upsert('lager_bestand',{produkt_id:pid,lagerort:zielLo,menge_kg:neuerAD,aktualisiert_am:new Date().toISOString()});
  const bres=await api.post('lager_buchungen',{produkt_id:pid,lagerort:zielLo,menge_kg:menge,notiz,kuerzel:meinKuerzel||null});
  buchungen.unshift(bres[0]);
  const bidx=bestaende.findIndex(b=>b.produkt_id===pid&&b.lagerort===zielLo);
  if(bidx>=0) bestaende[bidx].menge_kg=neuerAD; else bestaende.push({produkt_id:pid,lagerort:zielLo,menge_kg:neuerAD});
  const pnameEin=produkte.find(p=>p.id===pid)?.name||'';
  for(const prod of prodsFor(pnameEin)){
    const lsAlt=getLsBestand(prod.id)||0;
    await lsBestandSetzen(prod.id,lsAlt+(prod.id===pid?menge:0));
  }
}

let authToken = null;
function showLogin() { document.getElementById('loginScreen').style.display='flex'; }
function hideLogin() { document.getElementById('loginScreen').style.display='none'; }
async function doLogin() {
  const email=document.getElementById('loginEmail').value.trim(), pw=document.getElementById('loginPassword').value;
  const errEl=document.getElementById('loginError'); errEl.style.display='none';
  if(!email||!pw){errEl.textContent='Bitte E-Mail und Passwort eingeben.';errEl.style.display='block';return;}
  try {
    const r=await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`,{method:'POST',headers:{apikey:SUPABASE_KEY,'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
    const data=await r.json();
    if(!r.ok) throw new Error(data.error_description||data.msg||'Login fehlgeschlagen');
    authToken=data.access_token;
    localStorage.setItem('lager_token',authToken); localStorage.setItem('lager_refresh',data.refresh_token); localStorage.setItem('lager_token_exp',Date.now()+(data.expires_in*1000));
    hideLogin(); await init(); renderVerwaltung();
  }catch(e){errEl.textContent='❌ '+e.message;errEl.style.display='block';}
}
async function checkSession() {
  const token=localStorage.getItem('lager_token'), refresh=localStorage.getItem('lager_refresh'), exp=parseInt(localStorage.getItem('lager_token_exp')||'0');
  if(token&&Date.now()<exp){
    authToken=token;
    hideLogin();
    await init();
    renderVerwaltung();
    // Proaktiver Hintergrund-Refresh: 5 Minuten vor Ablauf automatisch erneuern
    const msLeft = exp - Date.now();
    const refreshIn = Math.max(msLeft - 5 * 60 * 1000, 10000);
    setTimeout(async () => {
      try { await refreshTokenIfNeeded(); } catch(e) { /* wird beim nächsten API-Call behandelt */ }
    }, refreshIn);
  } else if(refresh){
    try {
      const r=await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`,{method:'POST',headers:{apikey:SUPABASE_KEY,'Content-Type':'application/json'},body:JSON.stringify({refresh_token:refresh})});
      const data=await r.json(); if(!r.ok) throw new Error();
      authToken=data.access_token;
      localStorage.setItem('lager_token',authToken); localStorage.setItem('lager_refresh',data.refresh_token);
      const newExp = Date.now()+(data.expires_in*1000);
      localStorage.setItem('lager_token_exp', newExp);
      hideLogin(); await init(); renderVerwaltung();
      // Auch hier proaktiver Refresh planen
      const refreshIn = Math.max(data.expires_in*1000 - 5*60*1000, 10000);
      setTimeout(async () => {
        try { await refreshTokenIfNeeded(); } catch(e) {}
      }, refreshIn);
    }catch(e){localStorage.removeItem('lager_token');localStorage.removeItem('lager_refresh');localStorage.removeItem('lager_token_exp');showLogin();}
  } else { showLogin(); }
}
function doLogout() { authToken=null; localStorage.removeItem('lager_token'); localStorage.removeItem('lager_refresh'); localStorage.removeItem('lager_token_exp'); showLogin(); }

    ${lsAustraege.length?`<div style="display:flex;flex-direction:column;gap:8px;">${lsAustraege.slice(0,20).map(ls=>{const p=produkte.find(p=>p.id===ls.produkt_id),lsDat=ls.ls_datum?fmtDatumKurz(ls.ls_datum):null;const m=Number(ls.menge_kg),pos=m>0,boxBg=pos?'#f0fdf4':'#fef2f2',boxBd=pos?'#86efac':'#fca5a5',boxCol=pos?'#15803d':'#b91c1c';return`<div style="background:#fff;border:1px solid #bae6fd;border-radius:10px;padding:12px 14px;box-shadow:0 1px 4px rgba(0,0,0,0.07);display:flex;align-items:center;gap:12px;"><div style="background:${boxBg};border:1px solid ${boxBd};border-radius:8px;padding:6px 12px;font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:${boxCol};white-space:nowrap;">${pos?'+':''}${m} kg</div><div style="flex:1;"><div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;color:#0f172a;">${p?p.name:'–'}</div><div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;color:#0f172a;margin-top:2px;">${ls.kunde}${ls.kuerzel?` <span style="font-size:11px;font-weight:400;color:#64748b;">· ${ls.kuerzel}</span>`:''}</div><div style="font-family:'DM Mono',monospace;font-size:10px;color:#94a3b8;margin-top:1px;">${fmtDatum(ls.erstellt_am)}${lsDat?' · LS vom '+lsDat:''}</div></div><span style="background:${boxBg};border:1px solid ${boxBd};border-radius:6px;padding:2px 8px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:${boxCol};white-space:nowrap;">${pos?'Korrektur':'LS'}</span></div>`;}).join('')}</div>`:'<div class="empty">Noch keine LS Austraege</div>'}`;

function lsKundeSuche(q,listId){const list=document.getElementById(listId);if(!list)return;const matches=kunden.filter(k=>k.name.toLowerCase().includes(q.toLowerCase()));list.innerHTML=matches.slice(0,8).map(k=>`<div onclick="document.getElementById('${listId}').previousElementSibling.value='${k.name}';document.getElementById('${listId}').style.display='none';" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #e0f2fe;font-family:'Barlow',sans-serif;font-size:14px;color:#0f172a;" onmouseover="this.style.background='#e0f2fe'" onmouseout="this.style.background=''">${k.name}</div>`).join('');list.style.display=matches.length?'block':'none';}
function lsToggleSign(sid){const btn=document.getElementById(sid+'_sign'),lbl=document.getElementById(sid+'_sign_label');if(!btn)return;if(btn.textContent==='−'){btn.textContent='+';btn.style.background='#f0fdf4';btn.style.borderColor='#86efac';btn.style.color='#15803d';if(lbl){lbl.textContent='Eingang (+)';lbl.style.color='#15803d';}}else{btn.textContent='−';btn.style.background='#fef2f2';btn.style.borderColor='#fca5a5';btn.style.color='#b91c1c';if(lbl){lbl.textContent='Entnahme (−)';lbl.style.color='#b91c1c';}}}
async function lsAustragSpeichernDirekt(pid,sid,gebinde){
  const mengeInp=document.getElementById(sid+'_menge'),datumInp=document.getElementById(sid+'_datum'),kundeInp=document.getElementById(sid+'_kunde'),signBtn=document.getElementById(sid+'_sign');
  const menge=parseFloat(mengeInp?.value),kunde=kundeInp?.value.trim(),lsDatum=datumInp?.value||null,istEingang=signBtn&&signBtn.textContent==='+';
  if(isNaN(menge)||menge<=0){toast('⚠️ Bitte Menge eingeben');mengeInp?.focus();return;}
  if(!kunde){toast('⚠️ Bitte Kunde eingeben');kundeInp?.focus();return;}

  // getLsBestand gibt null zurück wenn KEIN Eintrag in lager_ls_bestand existiert (noch keine Inventur)
  // getLsBestand gibt 0 zurück wenn Eintrag existiert aber Bestand = 0 (komplett ausgetragen)
  // getLsBestand gibt >0 zurück wenn noch Bestand vorhanden
  // → null = Inventur fehlt (blockieren)
  // → 0 bei Eingang = ok (erlaubt, addiert)
  // → 0 bei Entnahme = blockieren (nichts mehr da)
  const lsAktuell = getLsBestand(pid);

  if (lsAktuell === null) {
    toast('⚠️ Kein LS-Bestand erfasst — bitte zuerst Inventur in Verwaltung → SET durchführen');
    return;
  }
  if (!istEingang && lsAktuell <= 0) {
    toast(`⛔ LS-Bestand ist 0 kg — nichts mehr zum Austragen`);
    return;
  }
  if (!istEingang && lsAktuell - menge < 0) {
    toast(`⛔ Nicht möglich: LS-Bestand ${lsAktuell} kg, Entnahme ${menge} kg — zu viel`);
    return;
  }

  sync('syncing');
  try {
    const delta=istEingang?menge:-menge, neuerLsBestand=lsAktuell+delta;
    await lsBestandSetzen(pid,neuerLsBestand);
    const res=await api.post('lager_ls_austrag',{produkt_id:pid,menge_kg:Math.abs(menge)*(istEingang?1:-1),kunde,kuerzel:meinKuerzel||null,ls_datum:lsDatum,ls_bestand_nach:neuerLsBestand});
    lsAustraege.unshift(res[0]);
    if(!kunden.find(k=>k.name.toLowerCase()===kunde.toLowerCase())){try{const kr=await api.post('lager_kunden',{name:kunde});kunden.push(kr[0]);kunden.sort((a,b)=>a.name.localeCompare(b.name));}catch(e){}}
    if(mengeInp)mengeInp.value='';if(datumInp)datumInp.value='';if(kundeInp)kundeInp.value='';
    sync('ok');renderLS(document.getElementById('lsSuche')?.value||'');renderDifferenz();
    const pname=produkte.find(p=>p.id===pid)?.name||'';
    toast(`📝 LS: ${istEingang?'+':'−'}${menge} kg ${pname} → ${kunde} (Rest: ${neuerLsBestand} kg)`);
  }catch(e){sync('error');toast('❌ '+e.message);}
}

function renderDifferenz(filterQ='',nurMitDiff=false){

    ${alleNames.length?alleNames.map(name=>{
      const lagerKg=gesamtKg(name),lsKg=getLsBestandName(name)??0,differenz=lagerKg-lsKg,hatDiff=differenz!==0;

      return`<div style="background:#fff;border:${hatDiff?'2px solid #fca5a5':'1px solid #bae6fd'};border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.10);margin-bottom:10px;">
        <div style="height:3px;background:${hatDiff?'#b91c1c':'#7dd3fc'};"></div>
        <div style="padding:12px 14px;border-bottom:1px solid #e0f2fe;">
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;color:#0f172a;margin-bottom:10px;">${name}</div>
          <div style="background:${diffBg};border:2px solid ${diffBorder};border-radius:8px;padding:10px;text-align:center;margin-bottom:8px;">
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:${hatDiff?diffColor:'#64748b'};margin-bottom:4px;">Außendienst − Innendienst = Differenz</div>
            <div style="font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:${diffColor};">${lagerKg} − ${lsKg} = ${differenz>0?'+':''}${differenz} kg</div>
            <div style="font-size:11px;color:#64748b;margin-top:4px;">${differenz>0?'⚠️ '+differenz+' kg mehr im Lager als auf LS — LS fehlt!':differenz<0?'🔴 '+Math.abs(differenz)+' kg mehr auf LS als im Lager — Fehler!':'✅ Lager und LS stimmen überein'}</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;">
            ${prodsFor(name).map(p=>{const adKg=getMenge(p.id,'Garage')+getMenge(p.id,'Werkstatt'),lsP=getLsBestand(p.id)??0,diffP=adKg-lsP,diffCol=diffP>0?'#b45309':diffP<0?'#b91c1c':'#15803d';return`<div style="display:grid;grid-template-columns:auto 1fr 1fr auto;gap:6px;align-items:center;background:#f8fafc;border:1px solid #e0f2fe;border-radius:8px;padding:8px 10px;"><span style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:1px;color:#475569;white-space:nowrap;">${p.gebinde_kg}kg</span><div style="text-align:center;"><div style="font-family:'DM Mono',monospace;font-size:14px;color:var(--surface2);">${adKg} kg</div><div style="font-size:9px;color:#94a3b8;">📦 G:${getMenge(p.id,'Garage')} W:${getMenge(p.id,'Werkstatt')}</div></div><div style="text-align:center;"><div style="font-family:'DM Mono',monospace;font-size:14px;color:#b91c1c;">${lsP} kg</div><div style="font-size:9px;color:#94a3b8;">📝 LS</div></div><div style="text-align:right;"><div style="font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:${diffCol};">${diffP>0?'+':''}${diffP}</div><div style="font-size:9px;color:#94a3b8;">Diff</div></div></div>`;}).join('')}
          </div>
        </div>
        ${lsEntries.length?`<div style="padding:10px 14px;"><div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:#64748b;text-transform:uppercase;margin-bottom:6px;">LS Einträge</div>${lsEntries.map(ls=>{const lsDat=ls.ls_datum?fmtDatumKurz(ls.ls_datum):null;const m=Number(ls.menge_kg),pos=m>0;return`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f1f5f9;"><span style="font-family:'DM Mono',monospace;font-size:13px;color:${pos?'#15803d':'#b91c1c'};min-width:60px;">${pos?'+':''}${m} kg</span><span style="flex:1;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:#0f172a;">${ls.kunde}</span><span style="font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:#94a3b8;text-align:right;line-height:1.25;">${fmtDatum(ls.erstellt_am)}${lsDat?'<br>LS: '+lsDat:''}${ls.kuerzel?' · '+ls.kuerzel:''}</span></div>`;}).join('')}</div>`:''}
      </div>`;
    }).join(''):'<div class="empty">Keine Einträge vorhanden</div>'}`;
  if(filterQ!==''){setTimeout(()=>{const sf=document.getElementById('differenzSuche');if(sf){sf.focus();sf.setSelectionRange(sf.value.length,sf.value.length);}},0);}
