<style>
:root {
  --bg: #0ea5e9;
  --surface: #0284c7;
  --surface2: #0369a1;
  --border: #38bdf8;
  --ok: #15803d;
  --warn: #b45309;
  --err: #b91c1c;
  --text: #0f172a;

}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: var(--header-h); background: var(--surface2);
  border-bottom: 1px solid var(--surface);
  padding: 0 14px; display: flex; align-items: center; gap: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: 1px; color: #fff; }
.logo span { color: #bae6fd; font-weight: 400; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; margin-left: auto; flex-shrink: 0; }
.sync-dot.syncing { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; animation: pulse 1s infinite; }
.sync-dot.error { background: #f87171; box-shadow: 0 0 6px #f87171; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.tabs {
  position: fixed; top: var(--header-h); left: 0; right: 0; z-index: 190;
  height: var(--tabs-h); background: var(--surface);
  border-bottom: 1px solid var(--surface2);
  display: flex; overflow-x: auto; scrollbar-width: none; align-items: stretch;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; display: flex; align-items: center; gap: 6px;
  padding: 0 16px; font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 14px; letter-spacing: 0.5px; color: #bae6fd;
  border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap;
  transition: all .15s; border: none; background: none;
}
.tab:hover { color: #fff; }
.tab.active { color: #fff; border-bottom-color: #fff; }

.scroll-area { position: fixed; top: calc(var(--header-h) + var(--tabs-h)); bottom: 0; left: 0; right: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.view { display: none; padding: 12px 12px 100px; }
.view.active { display: block; }

.sl { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #0f172a; margin: 14px 0 8px; display: flex; align-items: center; gap: 10px; }
.sl::after { content: ''; flex: 1; height: 1px; background: #7dd3fc; }

.card { background: #fff; border: 1px solid #bae6fd; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.10); margin-bottom: 10px; }
.card-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--surface2); padding: 9px 14px; background: #e0f2fe; border-bottom: 1px solid #bae6fd; }
.card-body { padding: 14px; }

.search-wrap { position: relative; margin-bottom: 10px; }
.search-input { width: 100%; background: #fff; border: 2px solid #7dd3fc; border-radius: 8px; padding: 11px 14px 11px 38px; font-family: 'Barlow', sans-serif; font-size: 15px; color: var(--text); outline: none; transition: border-color .15s; }
.search-input:focus { border-color: var(--surface2); box-shadow: 0 0 0 2px #bae6fd; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }

.filter-row { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }

.fpill { white-space: nowrap; padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.15); font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; color: #fff; cursor: pointer; transition: all .15s; }

.fpill.fp-warn.active { background: #fef2f2; color: var(--err); border-color: #fca5a5; }

/* PRODUKT CARD */
.pc { background: #fff; border: 1px solid #bae6fd; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.10); margin-bottom: 10px; }
.pc.pc-low { border-color: #fca5a5; }
.pc.pc-warn { border-color: #fcd34d; }
.pc-bar { height: 3px; background: #7dd3fc; }

.pc-bar.bw { background: var(--warn); }
.pc-header { padding: 12px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
.pc-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 20px; color: var(--text); flex: 1; }

.pc-total-rw { font-size: 10px; color: var(--muted); text-align: right; margin-top: 1px; }
.chev { font-size: 11px; color: var(--muted); transition: transform .2s; flex-shrink: 0; }

.chip-row { display: flex; flex-wrap: wrap; gap: 5px; padding: 0 14px 12px; }

.lchip.werkstatt { background: #fffbeb; border-color: #fcd34d; color: var(--warn); }

.pc-detail { border-top: 1px solid #e0f2fe; display: none; }

.gebinde-row { padding: 12px 14px; border-bottom: 1px solid #e0f2fe; }
.gebinde-row:last-child { border-bottom: none; }

.gebinde-size-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
.lort-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; padding: 2px 10px; border-radius: 4px; letter-spacing: 0.5px; }
.lort-badge.garage { background: #e0f2fe; color: var(--surface2); }
.lort-badge.werkstatt { background: #fffbeb; color: var(--warn); }

.gebinde-mid { display: flex; align-items: center; gap: 10px; }

.menge-sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

.counter-group { display: flex; gap: 6px; }
.cbtn { width: 44px; height: 44px; border-radius: 8px; border: 1px solid; font-size: 22px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .1s; font-family: 'Barlow Condensed', sans-serif; }

.cbtn.plus  { background: #f0fdf4; border-color: #86efac; color: var(--ok); }

.manual-row { display: flex; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #e0f2fe; }
.manual-inp { width: 64px; flex-shrink: 0; background: var(--input-bg); border: 1px solid #7dd3fc; border-radius: 6px; padding: 9px 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; outline: none; text-align: center; }

/* NEU BUTTON */

.f label { display: block; font-size: 11px; font-weight: 600; letter-spacing: .5px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; }
.f input, .f select { width: 100%; background: var(--input-bg); border: 1px solid #7dd3fc; border-radius: 6px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 9px 10px; outline: none; -webkit-appearance: none; }

/* STAT GRID */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }
.stat-card { background: #fff; border: 1px solid #bae6fd; border-radius: 10px; padding: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.10); }

/* LOG */
.log-item { background: #fff; border: 1px solid #bae6fd; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }

.log-sign.pos { color: var(--ok); }
.log-sign.neg { color: var(--err); }

.log-prod { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; color: var(--text); }
.log-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 2px; }

.lort-sm.werkstatt { background: #fffbeb; color: var(--warn); }

/* MODAL */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; display: none; align-items: flex-end; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: #fff; border-radius: 16px 16px 0 0; padding: 20px 16px 40px; width: 100%; max-width: 480px; }
.modal-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 20px; color: var(--text); margin-bottom: 16px; }
.modal-close { float: right; background: #e0f2fe; border: none; border-radius: 6px; padding: 4px 10px; font-size: 16px; cursor: pointer; color: var(--surface2); font-weight: 700; }
.btn-save { display: block; width: 100%; padding: 12px; border-radius: 8px; background: var(--surface2); color: #fff; border: none; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 0.5px; cursor: pointer; margin-top: 10px; }

/* RESULT ROWS */
.rr { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #e0f2fe; }
.rr:last-child { border-bottom: none; }
.rl { color: var(--muted); font-size: 12px; flex: 1; }
.rv { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text); text-align: right; }
.rv.err { color: var(--err); }

/* TOAST */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); color: #fff; border: 1px solid #7dd3fc; padding: 12px 20px; border-radius: 8px; font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 500; z-index: 999; transition: transform 0.3s; white-space: nowrap; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
.toast.show { transform: translateX(-50%) translateY(0); }

.empty { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.75); font-size: 14px; }
</style>

<script>
  // Service Worker registrieren für Auto-Updates
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js?v=27').then(reg => {
        // Alle 60 Minuten auf Updates prüfen
        setInterval(() => reg.update(), 60 * 60 * 1000);
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // Neues Update verfügbar – Toast zeigen
              showUpdateBanner();
            }
          });
        });
      });
    });
    // Nach Aktivierung neu laden
    navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
  }
  function showUpdateBanner() {
    const b = document.getElementById('updateBanner');
    if (b) b.style.display = 'flex';
  }

  // Pull-to-refresh
  (function() {
    let startY = 0, pulling = false, indicator = null;
    function getInd() {
      if (!indicator) {
        indicator = document.createElement('div');
        indicator.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:8000;background:#0369a1;color:#fff;text-align:center;font-family:Barlow Condensed,sans-serif;font-weight:700;font-size:13px;letter-spacing:0.5px;padding:10px;transform:translateY(-100%);transition:transform 0.15s;';
        document.body.appendChild(indicator);
      }
      return indicator;
    }
    document.addEventListener('touchstart', e => {
      const sa = document.querySelector('.scroll-area');
      if (sa && sa.scrollTop === 0) { startY = e.touches[0].clientY; pulling = true; }
    }, { passive: true });
    document.addEventListener('touchmove', e => {
      if (!pulling) return;
      const dy = e.touches[0].clientY - startY;
      if (dy > 10) {
        const ind = getInd();
        const pct = Math.min(dy / 80, 1);
        ind.style.transform = `translateY(${(pct - 1) * 100}%)`;
        ind.textContent = pct >= 1 ? '↑ Loslassen zum Aktualisieren' : '↓ Zum Aktualisieren ziehen';
      }
    }, { passive: true });
    document.addEventListener('touchend', e => {
      if (!pulling) return;
      pulling = false;
      const dy = e.changedTouches[0].clientY - startY;
      const ind = getInd();
      ind.style.transform = 'translateY(-100%)';
      if (dy > 80) {
        ind.textContent = '🔄 Aktualisiere…';
        ind.style.transform = 'translateY(0)';
        setTimeout(() => location.reload(), 400);
      }
    }, { passive: true });
  })();
</script>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════
// API HELPER
// ══════════════════════════════════════════════════════════
const api = {
  h() { return { apikey: SUPABASE_KEY, Authorization: `Bearer ${authToken || SUPABASE_KEY}`, 'Content-Type': 'application/json' }; },
  async get(table, qs='') {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${qs}`, { headers: this.h() });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async post(table, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method:'POST', headers:{...this.h(), Prefer:'return=representation'}, body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async patch(table, filter, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`, {
      method:'PATCH', headers:{...this.h(), Prefer:'return=minimal'}, body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error(await r.text());
  },
  async upsert(table, data, onConflict='produkt_id,lagerort') {
    // Erst prüfen ob Eintrag existiert
    const check = await fetch(
      `${SUPABASE_URL}/rest/v1/${table}?produkt_id=eq.${data.produkt_id}&lagerort=eq.${data.lagerort}`,
      { headers: this.h() }
    );
    const existing = await check.json();
    if (existing && existing.length > 0) {
      // UPDATE
      const r = await fetch(
        `${SUPABASE_URL}/rest/v1/${table}?produkt_id=eq.${data.produkt_id}&lagerort=eq.${data.lagerort}`,
        { method:'PATCH', headers:{...this.h(), Prefer:'return=minimal'}, body: JSON.stringify(data) }
      );
      if (!r.ok) throw new Error(await r.text());
    } else {
      // INSERT
      const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
        method:'POST', headers:{...this.h(), Prefer:'return=minimal'}, body: JSON.stringify(data)
      });
      if (!r.ok) throw new Error(await r.text());
    }
  }
};

// ══════════════════════════════════════════════════════════
// DATUM HELFER – global verfügbar
// ══════════════════════════════════════════════════════════
function fmtDatum(isoStr) {
  if (!isoStr) return '–';
  const d = new Date(isoStr);
  return d.toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function fmtDatumKurz(isoStr) {
  if (!isoStr) return '–';
  const d = new Date(isoStr);
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'});
}
// norm: globale Normalisierung für Suche (Leerzeichen, Bindestriche etc. ignorieren)
const norm = s => s.toLowerCase().split(' ').join('').split('-').join('').split('.').join('').split('_').join('');

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let produkte = [], bestaende = [], buchungen = [], userKuerzel = [], lsAustraege = [], kunden = [], lsBestaende = [], eingaenge = [];
let aktFilter = 'alle';
let meinKuerzel = '';
let meineUserId = null;

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
async function init() {
  sync('syncing');
  try {
    // User-ID aus Token lesen
    try {
      const payload = JSON.parse(atob(authToken.split('.')[1]));
      meineUserId = payload.sub;
    } catch(e) {}

    [produkte, bestaende, buchungen, userKuerzel, lsAustraege, kunden, lsBestaende, eingaenge] = await Promise.all([
      api.get('lager_produkte','order=name.asc,gebinde_kg.desc'),
      api.get('lager_bestand','order=lagerort.asc'),
      api.get('lager_buchungen','order=erstellt_am.desc&limit=150'),
      api.get('lager_user_kuerzel','order=kuerzel.asc'),
      api.get('lager_ls_austrag','order=erstellt_am.desc&limit=300'),
      api.get('lager_kunden','order=name.asc'),
      api.get('lager_ls_bestand','order=produkt_id.asc'),
      api.get('lager_eingang','order=erstellt_am.desc&limit=100')
    ]);
    // Eigenes Kürzel setzen
    const meins = userKuerzel.find(u => u.user_id === meineUserId);
    meinKuerzel = meins ? meins.kuerzel : '';
    sync('ok');
    renderProdukte(); renderUebersicht(); renderLog(); renderVerwaltung(); renderLS(); renderDifferenz(); renderHilfe();
  } catch(e) { sync('error'); toast('❌ Verbindungsfehler: ' + e.message); }
}

function sync(s) {
  const d = document.getElementById('syncDot');
  d.className = 'sync-dot' + (s !== 'ok' ? ' ' + s : '');
}

// ══════════════════════════════════════════════════════════
// TABS / FILTER
// ══════════════════════════════════════════════════════════
function setTab(id, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  btn.classList.add('active');
}
function setFilter(f, btn) {
  aktFilter = f;
  document.querySelectorAll('.fpill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderProdukte();
}

// ══════════════════════════════════════════════════════════
// HELFER
// ══════════════════════════════════════════════════════════
const iqq = (s) => s.replace(/[\s\/\.]/g,'_'); // ID-safe string
function getMenge(pid, lo) {
  const b = bestaende.find(b => b.produkt_id === pid && b.lagerort === lo);
  return b ? Number(b.menge_kg) : 0;
}
function uniqueNames() { return [...new Set(produkte.map(p => p.name))]; }
function prodsFor(name) { return produkte.filter(p => p.name === name); }
function gesamtKg(name) {
  const ids = prodsFor(name).map(p => p.id);
  return bestaende.filter(b => ids.includes(b.produkt_id)).reduce((s,b) => s + Number(b.menge_kg), 0);
}
function richtwert(name) {
  // Summe aller Richtwerte pro Gebindegröße
  const sum = prodsFor(name).reduce((s,p) => s + (Number(p.richtwert_kg)||0), 0);
  return sum > 0 ? sum : null;
}
function getLsBestand(pid) {
  // LS-Bestand: was laut Innendienst noch vorhanden sein sollte
  const b = lsBestaende.find(b => b.produkt_id === pid);
  return b ? Number(b.menge_kg) : null; // null = noch keine Inventur gemacht
}
function getLsBestandName(name) {
  // LS-Bestand Summe über alle Gebindegrößen eines Produktnamens
  const ids = prodsFor(name).map(p => p.id);
  const eintraege = lsBestaende.filter(b => ids.includes(b.produkt_id));
  if (!eintraege.length) return null; // noch keine Inventur
  return eintraege.reduce((s,b) => s + Number(b.menge_kg), 0);
}

function richtwertProd(pid) {
  const p = produkte.find(p => p.id === pid);
  return p && p.richtwert_kg ? Number(p.richtwert_kg) : null;
}
function loKg(name, lo) {
  const ids = prodsFor(name).map(p => p.id);
  return bestaende.filter(b => ids.includes(b.produkt_id) && b.lagerort === lo).reduce((s,b) => s + Number(b.menge_kg), 0);
}

// ══════════════════════════════════════════════════════════
// BUCHEN
// ══════════════════════════════════════════════════════════
async function buchen(pid, lo, delta, notiz='') {
  sync('syncing');
  try {
    const neu = Math.max(0, getMenge(pid, lo) + Number(delta));
    await api.upsert('lager_bestand', {
      produkt_id: pid, lagerort: lo, menge_kg: neu,
      aktualisiert_am: new Date().toISOString()
    });
    await api.post('lager_buchungen', { produkt_id: pid, lagerort: lo, menge_kg: delta, notiz: notiz||null, kuerzel: meinKuerzel||null });
    const idx = bestaende.findIndex(b => b.produkt_id===pid && b.lagerort===lo);
    if (idx>=0) bestaende[idx].menge_kg = neu;
    else bestaende.push({ produkt_id:pid, lagerort:lo, menge_kg:neu });
    buchungen.unshift({ produkt_id:pid, lagerort:lo, menge_kg:delta, notiz, kuerzel:meinKuerzel||null, erstellt_am:new Date().toISOString() });
    sync('ok');
    renderProdukte(); renderUebersicht(); renderLog();
    const pname = produkte.find(p => p.id===pid)?.name||'';
    toast(`${delta>0?'➕':'➖'} ${Math.abs(delta)} kg · ${pname} · ${lo}`);
  } catch(e) { sync('error'); toast('❌ ' + e.message); }
}

// ══════════════════════════════════════════════════════════
// RENDER PRODUKTE
// ══════════════════════════════════════════════════════════
function renderProdukte() {
  const raw = document.getElementById('searchInput').value.trim();
  const el = document.getElementById('produktListe');
  // Scroll-Position und offene Karten merken
  const scrollEl = document.querySelector('.scroll-area');
  const scrollTop = scrollEl ? scrollEl.scrollTop : 0;
  const offene = [...document.querySelectorAll('.pc.open')].map(c => c.id);
  const q = norm(raw); // nutzt globale norm Funktion

  const names = uniqueNames().filter(name => {
    if (q && !norm(name).includes(q)) return false;
    if (aktFilter === 'garage') return loKg(name,'Garage') > 0;
    if (aktFilter === 'werkstatt') return loKg(name,'Werkstatt') > 0;
    if (aktFilter === 'niedrig') {
      return prodsFor(name).some(p => {
        const rw = richtwertProd(p.id);
        if (!rw) return false;
        return (getMenge(p.id,'Garage') + getMenge(p.id,'Werkstatt')) < rw * 0.5;
      });
    }
    return true;
  });

  if (!names.length) { el.innerHTML='<div class="empty">Keine Produkte gefunden</div>'; return; }

  el.innerHTML = names.map(name => {
    const gkg = gesamtKg(name);
    const rw = richtwert(name);
    const pct = rw ? gkg/rw : 1;
    const barCls = pct < 0.3 ? 'bl' : pct < 0.5 ? 'bw' : '';
    const cardCls = pct < 0.3 ? 'pc-low' : pct < 0.5 ? 'pc-warn' : '';

    const prods = prodsFor(name);
    // Ein Chip pro Gebindegröße × Lagerort wo Bestand > 0
    const chips = prods.flatMap(p => {
      const rwP = richtwertProd(p.id);
      return ['Garage','Werkstatt'].map(lo => {
        const kg = getMenge(p.id, lo);
        if (!kg) return '';
        const rwTxt = rwP ? ` · <span style="opacity:0.5;font-size:10px;">RW ${rwP}kg</span>` : '';
        return `<span class="lchip ${lo.toLowerCase()}">
          <span class="lchip-dot"></span>${lo==='Garage'?'🔵':'🟡'} <span style="opacity:0.5;font-size:10px;">${p.gebinde_kg}kg</span> <strong>${kg}kg</strong>${rwTxt}
        </span>`;
      });
    }).join('');

    const rows = prodsFor(name).flatMap(p =>
      ['Garage','Werkstatt'].map(lo => {
        const kg = getMenge(p.id, lo);
        const kan = p.gebinde_kg ? (kg/p.gebinde_kg).toFixed(1) : '–';
        const sid = `${iqq(p.id)}_${lo}`;
        return `<div class="gebinde-row">
          <div class="gebinde-top">
            <span class="gebinde-size-label">${p.gebinde_kg} kg Gebinde</span>
            <span class="lort-badge ${lo.toLowerCase()}">${lo==='Garage'?'🔵':'🟡'} ${lo}</span>
          </div>
          <div class="gebinde-mid">
            <div class="menge-display">
              <div class="menge-kg">${kg} <span style="font-size:14px;color:var(--muted)">kg</span></div>
              <div class="menge-sub">${kan} Gebinde à ${p.gebinde_kg} kg</div>
            </div>
            <div class="counter-group">
              <button class="cbtn minus" onclick="qb('${p.id}','${lo}',-${p.gebinde_kg},event)">−</button>
              <button class="cbtn plus"  onclick="qb('${p.id}','${lo}',+${p.gebinde_kg},event)">+</button>
            </div>
          </div>
          <div class="manual-row">
            <button id="sign_${sid}" onclick="toggleSign('${sid}')"
              style="width:42px;height:42px;border-radius:8px;border:1px solid #fca5a5;background:#fef2f2;color:#b91c1c;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;cursor:pointer;flex-shrink:0;">−</button>
            <input type="number" class="manual-inp" id="m_${sid}" placeholder="Gebinde" step="1" min="0"
              style="text-align:center;">
            <input type="text" class="note-inp" id="n_${sid}" placeholder="Notiz (Kunde…)">
            <button class="btn-ok" onclick="mb('${p.id}','${lo}','${sid}',${p.gebinde_kg})">OK</button>
          </div>
        </div>`;
      })
    ).join('');

    return `<div class="pc ${cardCls}" id="pc_${iqq(name)}">
      <div class="pc-bar ${barCls}"></div>
      <div class="pc-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="pc-name">${name}</div>
        <div>
          <div class="pc-total-kg">${gkg} kg</div>
          ${rw?`<div class="pc-total-rw">Richtwert: ${rw} kg</div>`:''}
        </div>
        <span class="chev">▼</span>
      </div>
      <div class="chip-row">
        ${chips||'<span style="font-size:12px;color:#94a3b8">Noch kein Bestand – nur über Verwaltung einbuchen</span>'}
      </div>
      <div class="pc-detail">${rows}</div>
    </div>`;
  }).join('');
  // Offene Karten nach Re-Render wiederherstellen
  setTimeout(() => {
    offene.forEach(id => {
      const c = document.getElementById(id);
      if (c) c.classList.add('open');
    });
    // Scroll-Position wiederherstellen
    if (scrollEl) scrollEl.scrollTop = scrollTop;
  }, 0);
}

async function qb(pid,lo,delta,e) { e.stopPropagation(); await buchen(pid,lo,delta); }
function toggleSign(sid) {
  const btn = document.getElementById('sign_'+sid);
  if (!btn) return;
  if (btn.textContent === '−') {
    btn.textContent = '+';
    btn.style.background = '#f0fdf4';
    btn.style.borderColor = '#86efac';
    btn.style.color = '#15803d';
  } else {
    btn.textContent = '−';
    btn.style.background = '#fef2f2';
    btn.style.borderColor = '#fca5a5';
    btn.style.color = '#b91c1c';
  }
}

async function mb(pid,lo,sid,gebinde) {
  const inp=document.getElementById('m_'+sid);
  const noteInp=document.getElementById('n_'+sid);
  const signBtn=document.getElementById('sign_'+sid);
  const anzahl=parseFloat(inp.value);
  if(isNaN(anzahl)||anzahl<=0){toast('⚠️ Bitte Anzahl Gebinde eingeben');return;}
  const isNeg = !signBtn || signBtn.textContent === '−';
  const deltaKg = (isNeg ? -1 : 1) * anzahl * gebinde;
  const notiz=noteInp?.value.trim()||'';
  inp.value=''; if(noteInp) noteInp.value='';
  await buchen(pid,lo,deltaKg,notiz);
}

// ══════════════════════════════════════════════════════════
// NEUES PRODUKT
// ══════════════════════════════════════════════════════════
function openModal() { document.getElementById('modalNeu').classList.add('open'); }
function closeModal() { document.getElementById('modalNeu').classList.remove('open'); }

async function speichereNeuesProdukt() {
  const name = document.getElementById('neu-name').value.trim();
  const geb = parseInt(document.getElementById('neu-gebinde').value);
  const rw = parseFloat(document.getElementById('neu-richtwert').value)||null;
  const start = parseFloat(document.getElementById('neu-startmenge')?.value)||null;
  if(!name||!geb){toast('⚠️ Name und Gebindegröße erforderlich');return;}
  sync('syncing');
  try {
    const res = await api.post('lager_produkte', {name, gebinde_kg:geb, richtwert_kg:rw});
    const np = res[0];
    produkte.push(np);
    produkte.sort((a,b)=>a.name.localeCompare(b.name));
    // Startmenge als Inventur in Garage buchen
    if (start && start > 0) {
      await api.upsert('lager_bestand', {produkt_id:np.id, lagerort:'Garage', menge_kg:start, aktualisiert_am:new Date().toISOString()});
      await api.post('lager_buchungen', {produkt_id:np.id, lagerort:'Garage', menge_kg:start, notiz:'Inventur/Start', kuerzel:meinKuerzel||null});
      bestaende.push({produkt_id:np.id, lagerort:'Garage', menge_kg:start});
      await lsBestandSetzen(np.id, start, 'Inventur/Start');
      buchungen.unshift({produkt_id:np.id, lagerort:'Garage', menge_kg:start, notiz:'Inventur/Start', kuerzel:meinKuerzel||null, erstellt_am:new Date().toISOString()});
    }
    sync('ok');
    ['neu-name','neu-gebinde','neu-richtwert','neu-startmenge'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    renderProdukte(); renderUebersicht(); renderVerwaltung(); renderLS(); renderDifferenz();
    toast('✅ ' + name + (start ? ` — ${start} kg in Garage` : ' angelegt'));
  } catch(e){sync('error');toast('❌ '+e.message);}
}

// ══════════════════════════════════════════════════════════
// ÜBERSICHT
// ══════════════════════════════════════════════════════════
function renderUebersicht() {
  const el = document.getElementById('uebersichtContent');
  const gKg = bestaende.filter(b=>b.lagerort==='Garage').reduce((s,b)=>s+Number(b.menge_kg),0);
  const wKg = bestaende.filter(b=>b.lagerort==='Werkstatt').reduce((s,b)=>s+Number(b.menge_kg),0);
  const niedrig = uniqueNames().filter(n=>{const rw=richtwert(n);return rw&&gesamtKg(n)<rw*0.5;});

  el.innerHTML = `
    <div class="sl" style="margin-top:14px">Lagerübersicht</div>
    <div class="stat-grid">
      <div class="stat-card" style="border-color:#7dd3fc">
        <div class="stat-label">🔵 Garage</div>
        <div class="stat-val" style="color:var(--surface2)">${gKg}</div>
        <div class="stat-sub">kg gesamt</div>
      </div>
      <div class="stat-card" style="border-color:#fcd34d">
        <div class="stat-label">🟡 Werkstatt</div>
        <div class="stat-val" style="color:var(--warn)">${wKg}</div>
        <div class="stat-sub">kg gesamt</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">📦 Produkte</div>
        <div class="stat-val">${uniqueNames().length}</div>
        <div class="stat-sub">erfasst</div>
      </div>
      <div class="stat-card" style="${niedrig.length?'border-color:#fca5a5':''}">
        <div class="stat-label">⚠️ Niedrig</div>
        <div class="stat-val" style="color:${niedrig.length?'var(--err)':'var(--ok)'}">${niedrig.length}</div>
        <div class="stat-sub">unter 50% Richtwert</div>
      </div>
    </div>

    ${niedrig.length ? `
    <div class="sl">⚠️ Nachbestellen</div>
    <div class="card"><div class="card-body">
      ${niedrig.map(name=>{
        const kg=gesamtKg(name), rw=richtwert(name), pct=Math.round(kg/rw*100);
        return `<div class="rr"><span class="rl">${name}</span>
          <span class="rv err">${kg} kg <span style="color:#94a3b8;font-size:11px">/ ${rw} kg (${pct}%)</span></span></div>`;
      }).join('')}
    </div></div>` : `
    <div class="sl">Status</div>
    <div class="card"><div class="card-body" style="text-align:center;padding:20px;color:var(--ok);font-weight:600">
      ✅ Alle Bestände im grünen Bereich
    </div></div>`}

    <div class="sl">Alle Produkte</div>
    <div class="card"><div class="card-body">
      ${uniqueNames().map(name=>{
        const kg=gesamtKg(name), rw=richtwert(name);
        const isLow=rw&&kg<rw*0.5;
        const gk=loKg(name,'Garage'), wk=loKg(name,'Werkstatt');
        return `<div class="rr">
          <div class="rl">${name}
            <div style="margin-top:2px;display:flex;gap:8px">
              ${gk>0?`<span style="font-size:10px;color:var(--surface2)">🔵 ${gk} kg</span>`:''}
              ${wk>0?`<span style="font-size:10px;color:var(--warn)">🟡 ${wk} kg</span>`:''}
            </div>
          </div>
          <span class="rv ${isLow?'err':''}">${kg} kg</span>
        </div>`;
      }).join('')}
    </div></div>
  `;
}

// ══════════════════════════════════════════════════════════
// LOG
// ══════════════════════════════════════════════════════════
function renderLog(filterQ='') {
  const el = document.getElementById('logContent');

  // Buchungen (Außendienst) und LS-Austraege (Innendienst) zusammenführen
  let alleBuchungen = [
    ...buchungen.map(b => ({ ...b, _typ: 'AD' })),
    ...lsAustraege.map(ls => ({ ...ls, _typ: 'LS', lagerort: 'LS', menge_kg: ls.menge_kg }))
  ].sort((a,b) => new Date(b.erstellt_am) - new Date(a.erstellt_am));

  // Filter anwenden
  if (filterQ) {
    const q = norm(filterQ);
    alleBuchungen = alleBuchungen.filter(b => {
      const p = produkte.find(p => p.id === b.produkt_id);
      const pname = p ? norm(p.name) : '';
      const kuerzel = (b.kuerzel||'').toLowerCase();
      const kunde = norm(b.kunde||'');
      return pname.includes(q) || kuerzel.includes(q) || kunde.includes(q);
    });
  }
  alleBuchungen = alleBuchungen.slice(0, 200);

  if (!alleBuchungen.length) { el.innerHTML = `
    <div style="position:relative;margin:12px 0 10px;">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;">🔍</span>
      <input type="search" class="search-input" id="logSuche" value="${filterQ}"
        oninput="renderLog(this.value)" placeholder="Produkt, Kürzel oder Kunde…"
        style="margin-bottom:0;" data-focus="1">
    </div>
    <div class="empty">Keine Einträge gefunden</div>`; return; }

  el.innerHTML = `
    <div style="position:relative;margin:12px 0 10px;">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;">🔍</span>
      <input type="search" class="search-input" id="logSuche" value="${filterQ}"
        oninput="renderLog(this.value)" placeholder="Produkt, Kürzel oder Kunde…" data-focus="1">
    </div>
    <div>` + alleBuchungen.map(b => {
    const p = produkte.find(p => p.id === b.produkt_id);
    const pos = Number(b.menge_kg) > 0;
    const datum = fmtDatum(b.erstellt_am);
    const istLS = b._typ === 'LS';
    const lortStyle = istLS
      ? 'background:#fffbeb;color:#b45309;border:none;'
      : (b.lagerort ? '' : '');
    const lortLabel = istLS ? 'LS' : b.lagerort;
    const lortClass = istLS ? '' : (b.lagerort ? b.lagerort.toLowerCase() : '');
    const lsDat = istLS && b.ls_datum ? ' · LS: ' + fmtDatumKurz(b.ls_datum) : '';
    const kundeInfo = istLS && b.kunde ? ' · ' + b.kunde : '';
    return `<div class="log-item" style="${istLS ? 'border-color:#fcd34d;' : ''}">
      <div class="log-sign ${pos?'pos':'neg'}">${pos?'+':''}${b.menge_kg}<br><span style="font-size:10px;color:var(--muted)">kg</span></div>
      <div class="log-info">
        <div class="log-prod">${p?p.name:'–'}
          <span class="lort-sm ${lortClass}" style="${lortStyle}">${lortLabel}</span>
        </div>
        <div class="log-meta">${datum}${b.kuerzel?' · <strong>'+b.kuerzel+'</strong>':''}${kundeInfo}${lsDat}${!istLS&&b.notiz?' · '+b.notiz:''}</div>
      </div>
    </div>`;
  }).join('') + '</div></div>';

  // Fokus wiederherstellen
  setTimeout(() => {
    const sf = document.getElementById('logSuche');
    if (sf && filterQ) { sf.focus(); sf.setSelectionRange(sf.value.length, sf.value.length); }
  }, 0);
}

let _tt;
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2500);
}

function applyUpdate() {
  navigator.serviceWorker.getRegistration().then(reg => {
    if (reg && reg.waiting) {
      reg.waiting.postMessage({ type: 'SKIP_WAITING' });
    } else {
      location.reload();
    }
  });
}

async function speichereKuerzel() {
  const kuerzel = document.getElementById('neu-kuerzel').value.trim().toUpperCase();
  const name = document.getElementById('neu-kuerzel-name').value.trim();
  const uid = document.getElementById('neu-kuerzel-uid').value.trim();
  if (!kuerzel || !uid) { toast('⚠️ Kürzel und User-ID erforderlich'); return; }
  sync('syncing');
  try {
    const res = await api.post('lager_user_kuerzel', { kuerzel, name: name||null, user_id: uid });
    userKuerzel.push(res[0]);
    sync('ok');
    renderVerwaltung(document.getElementById('verwaltungSuche')?.value||'');
    toast('✅ Kürzel angelegt: ' + kuerzel);
  } catch(e) { sync('error'); toast('❌ ' + e.message); }
}

async function loescheKuerzel(id) {
  sync('syncing');
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/lager_user_kuerzel?id=eq.${id}`, {
      method:'DELETE', headers: api.h()
    });
    userKuerzel = userKuerzel.filter(u => u.id !== id);
    sync('ok');
    renderVerwaltung(document.getElementById('verwaltungSuche')?.value||'');
    toast('🗑️ Kürzel gelöscht');
  } catch(e) { sync('error'); toast('❌ ' + e.message); }
}

async function buchen_eingang(pid, einsid) {
  const inp = document.getElementById(einsid);
  const loSel = document.getElementById(einsid+'_lo');
  const menge = parseFloat(inp.value);
  const zielLo = loSel ? loSel.value : 'Garage';
  if (isNaN(menge) || menge <= 0) { toast('⚠️ Bitte Menge eingeben'); return; }
  sync('syncing');
  try {
    await eintragEingang(pid, menge, zielLo);
    inp.value = '';
    sync('ok');
    renderVerwaltung(document.getElementById('verwaltungSuche')?.value||'');
    renderProdukte(); renderUebersicht(); renderDifferenz(); renderLog();
    const pname = produkte.find(p=>p.id===pid)?.name||'';
    toast(`📦 Eingang: +${menge} kg ${pname} → Lager + LS`);
  } catch(e) { sync('error'); toast('❌ ' + e.message); }
}

function editiereProdukt(pid) {
  const p = produkte.find(p => p.id === pid);
  if (!p) return;
  document.getElementById('edit-pid').value = pid;
  document.getElementById('edit-name').value = p.name;
  document.getElementById('edit-gebinde').value = p.gebinde_kg;
  document.getElementById('edit-richtwert').value = p.richtwert_kg || '';
  document.getElementById('modalEdit').classList.add('open');
}

async function speichereProduktEdit() {
  const pid = document.getElementById('edit-pid').value;
  const name = document.getElementById('edit-name').value.trim();
  const geb = parseInt(document.getElementById('edit-gebinde').value);
  const rw = parseFloat(document.getElementById('edit-richtwert').value)||null;
  if (!name || !geb) { toast('⚠️ Name und Gebindegröße erforderlich'); return; }
  sync('syncing');
  try {
    await api.patch('lager_produkte', `id=eq.${pid}`, {name, gebinde_kg:geb, richtwert_kg:rw});
    const p = produkte.find(p => p.id === pid);
    if (p) { p.name = name; p.gebinde_kg = geb; p.richtwert_kg = rw; }
    produkte.sort((a,b) => a.name.localeCompare(b.name));
    sync('ok');
    document.getElementById('modalEdit').classList.remove('open');
    renderProdukte(); renderVerwaltung(); renderUebersicht();
    toast('✅ Produkt aktualisiert: ' + name);
  } catch(e) { sync('error'); toast('❌ ' + e.message); }
}

async function loescheProdukt(pid, name) {
  if (!confirm(`Produkt "${name}" wirklich löschen? Alle Bestände und Buchungen werden ebenfalls gelöscht!`)) return;
  sync('syncing');
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/lager_produkte?id=eq.${pid}`, {method:'DELETE', headers:api.h()});
    produkte = produkte.filter(p => p.id !== pid);
    bestaende = bestaende.filter(b => b.produkt_id !== pid);
    buchungen = buchungen.filter(b => b.produkt_id !== pid);
    lsAustraege = lsAustraege.filter(b => b.produkt_id !== pid);
    lsBestaende = lsBestaende.filter(b => b.produkt_id !== pid);
    sync('ok');
    renderProdukte(); renderVerwaltung(); renderUebersicht(); renderLS(); renderDifferenz();
    toast('🗑️ Produkt gelöscht: ' + name);
  } catch(e) { sync('error'); toast('❌ ' + e.message); }
}

async function speichereRichtwert(pid, sid) {
  // Richtwert pro einzelner Gebindegröße (pid = Produkt-ID)
  const inp = document.getElementById('rw_' + sid);
  const val = parseFloat(inp.value) || null;
  sync('syncing');
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/lager_produkte?id=eq.${pid}`, {
      method: 'PATCH',
      headers: { ...api.h(), Prefer: 'return=minimal' },
      body: JSON.stringify({ richtwert_kg: val })
    });
    const p = produkte.find(p => p.id === pid);
    if (p) p.richtwert_kg = val;
    sync('ok');
    renderVerwaltung(document.getElementById('verwaltungSuche')?.value||'');
    renderUebersicht();
    const pname = p ? p.name + ' ' + p.gebinde_kg + 'kg' : '';
    toast(`✅ Richtwert ${pname}: ${val ? val + ' kg' : 'entfernt'}`);
  } catch(e) { sync('error'); toast('❌ ' + e.message); }
}

function bestaetigeSet(pid, lo, vsid) {
  const inp = document.getElementById('ist_' + vsid);
  const val = parseFloat(inp.value);
  if (isNaN(val) || val < 0) { toast('⚠️ Bitte gültigen kg-Wert eingeben'); return; }
  const pname = produkte.find(p=>p.id===pid)?.name||'';
  if (!confirm(`Lagerbestand wirklich überschreiben?\n\n${pname} · ${lo}\nNeuer Wert: ${val} kg\n\nDieser Wert ersetzt den aktuellen Bestand und setzt den LS-Bestand neu.`)) return;
  setzeIstBestand(pid, lo, vsid);
}

async function setzeIstBestand(pid, lo, vsid) {
  // Inventur: setzt Außendienst-Lagerbestand UND LS-Bestand auf denselben Wert
  const inp = document.getElementById('ist_' + vsid);
  const val = parseFloat(inp.value);
  if (isNaN(val) || val < 0) { toast('⚠️ Bitte gültigen kg-Wert eingeben'); return; }
  sync('syncing');
  try {
    const alt = getMenge(pid, lo);
    const delta = val - alt;
    // Außendienst Lagerbestand setzen
    await api.upsert('lager_bestand', { produkt_id:pid, lagerort:lo, menge_kg:val, aktualisiert_am:new Date().toISOString() });
    if (delta !== 0) {
      await api.post('lager_buchungen', { produkt_id:pid, lagerort:lo, menge_kg:delta, notiz:'Inventur/Korrektur', kuerzel:meinKuerzel||null });
      buchungen.unshift({ produkt_id:pid, lagerort:lo, menge_kg:delta, notiz:'Inventur/Korrektur', kuerzel:meinKuerzel||null, erstellt_am:new Date().toISOString() });
    }
    const bidx = bestaende.findIndex(b => b.produkt_id===pid && b.lagerort===lo);
    if (bidx>=0) bestaende[bidx].menge_kg = val;
    else bestaende.push({ produkt_id:pid, lagerort:lo, menge_kg:val });

    // LS-Bestand: Gesamtbestand über ALLE Gebindegrößen + Lagerorte dieses Produktnamens
    // Der LS-Bestand kennt keinen Lagerort — er ist der Gesamtbestand laut Innendienst
    const pname = produkte.find(p=>p.id===pid)?.name||'';
    const alleProdsDesNamens = prodsFor(pname);
    for (const prod of alleProdsDesNamens) {
      // Für jede Gebindegröße: Gesamtbestand AD (Garage + Werkstatt)
      const adGesamt = ['Garage','Werkstatt'].reduce((s,l) => {
        // Wenn das die aktuelle Gebindegröße + Lagerort ist: neuen Wert nutzen
        if (prod.id === pid && l === lo) return s + val;
        return s + getMenge(prod.id, l);
      }, 0);
      await lsBestandSetzen(prod.id, adGesamt, 'Inventur/Reset');
    }

    inp.value = '';
    sync('ok');
    renderVerwaltung(document.getElementById('verwaltungSuche')?.value||'');
    renderProdukte(); renderUebersicht(); renderLog(); renderDifferenz();
    toast(`✅ Inventur ${pname}: ${val} kg — beide Seiten gleichgesetzt`);
  } catch(e) { sync('error'); toast('❌ ' + e.message); }
}

async function lsBestandSetzen(pid, val, notiz='') {
  // LS-Bestand direkt setzen (für Inventur und Eingang)
  const check = await fetch(
    `${SUPABASE_URL}/rest/v1/lager_ls_bestand?produkt_id=eq.${pid}`,
    { headers: api.h() }
  );
  const existing = await check.json();
  if (existing && existing.length > 0) {
    await api.patch('lager_ls_bestand', `produkt_id=eq.${pid}`, { menge_kg: val, aktualisiert_am: new Date().toISOString() });
  } else {
    await fetch(`${SUPABASE_URL}/rest/v1/lager_ls_bestand`, {
      method:'POST', headers:{...api.h(), Prefer:'return=minimal'},
      body: JSON.stringify({ produkt_id: pid, menge_kg: val })
    });
  }
  const idx = lsBestaende.findIndex(b => b.produkt_id === pid);
  if (idx >= 0) lsBestaende[idx].menge_kg = val;
  else lsBestaende.push({ produkt_id: pid, menge_kg: val });
}

async function eintragEingang(pid, menge, zielLo='Garage') {
  // Eingang: addiert kg zu BEIDEN Seiten (Außendienst gewählter Lagerort + LS)
  const neuerAD = getMenge(pid, zielLo) + menge;
  await api.upsert('lager_bestand', { produkt_id:pid, lagerort:zielLo, menge_kg:neuerAD, aktualisiert_am:new Date().toISOString() });
  await api.post('lager_buchungen', { produkt_id:pid, lagerort:zielLo, menge_kg:menge, notiz:'Eingang/Anlieferung', kuerzel:meinKuerzel||null });
  buchungen.unshift({ produkt_id:pid, lagerort:zielLo, menge_kg:menge, notiz:'Eingang/Anlieferung', kuerzel:meinKuerzel||null, erstellt_am:new Date().toISOString() });
  const bidx = bestaende.findIndex(b => b.produkt_id===pid && b.lagerort===zielLo);
  if (bidx>=0) bestaende[bidx].menge_kg = neuerAD;
  else bestaende.push({ produkt_id:pid, lagerort:zielLo, menge_kg:neuerAD });
  // LS-Bestand für ALLE Gebindegrößen des Produktnamens erhöhen
  // Menge proportional zu jeder Gebindegröße addieren — oder einfach auf die
  // gewählte Gebindegröße (pid) addieren, Rest bleibt
  const pnameEin = produkte.find(p=>p.id===pid)?.name||'';
  const alleProdsEin = prodsFor(pnameEin);
  for (const prod of alleProdsEin) {
    const lsAlt = getLsBestand(prod.id) || 0;
    // Nur für die gewählte Gebindegröße addieren
    const zusatz = prod.id === pid ? menge : 0;
    await lsBestandSetzen(prod.id, lsAlt + zusatz, 'Eingang/Anlieferung');
  }
  // lager_eingang Tabelle wird nicht mehr separat geloggt — lager_buchungen reicht
}

let authToken = null;

function showLogin() {
  const ls = document.getElementById('loginScreen'); ls.style.display = 'flex';
}
function hideLogin() {
  document.getElementById('loginScreen').style.display = 'none';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  if (!email || !pw) { errEl.textContent = 'Bitte E-Mail und Passwort eingeben.'; errEl.style.display = 'block'; return; }
  try {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pw })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error_description || data.msg || 'Login fehlgeschlagen');
    authToken = data.access_token;
    // Token + Refresh Token speichern
    localStorage.setItem('lager_token', authToken);
    localStorage.setItem('lager_refresh', data.refresh_token);
    localStorage.setItem('lager_token_exp', Date.now() + (data.expires_in * 1000));
    hideLogin();
    await init();
    renderVerwaltung();
  } catch(e) {
    errEl.textContent = '❌ ' + e.message;
    errEl.style.display = 'block';
  }
}

async function checkSession() {
  const token = localStorage.getItem('lager_token');
  const refresh = localStorage.getItem('lager_refresh');
  const exp = parseInt(localStorage.getItem('lager_token_exp') || '0');

  if (token && Date.now() < exp) {
    // Token noch gültig
    authToken = token;
    hideLogin();
    await init();
    renderVerwaltung();
  } else if (refresh) {
    // Token abgelaufen aber Refresh Token vorhanden -> automatisch erneuern
    try {
      const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
        method: 'POST',
        headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: refresh })
      });
      const data = await r.json();
      if (!r.ok) throw new Error('Refresh fehlgeschlagen');
      authToken = data.access_token;
      localStorage.setItem('lager_token', authToken);
      localStorage.setItem('lager_refresh', data.refresh_token);
      localStorage.setItem('lager_token_exp', Date.now() + (data.expires_in * 1000));
      hideLogin();
      await init();
      renderVerwaltung();
    } catch(e) {
      // Refresh fehlgeschlagen -> neu einloggen
      localStorage.removeItem('lager_token');
      localStorage.removeItem('lager_refresh');
      localStorage.removeItem('lager_token_exp');
      showLogin();
    }
  } else {
    showLogin();
  }
}

function doLogout() {
  authToken = null;
  localStorage.removeItem('lager_token');
  localStorage.removeItem('lager_refresh');
  localStorage.removeItem('lager_token_exp');
  showLogin();
}


checkSession();

async function lsAustragSpeichernDirekt(pid, sid, gebinde) {
  const mengeInp = document.getElementById(sid+'_menge');
  const datumInp = document.getElementById(sid+'_datum');
  const kundeInp = document.getElementById(sid+'_kunde');
  const signBtn = document.getElementById(sid+'_sign');
  const menge = parseFloat(mengeInp?.value);
  const kunde = kundeInp?.value.trim();
  const lsDatum = datumInp?.value || null;
  const istEingang = signBtn && signBtn.textContent === '+';

  if (isNaN(menge) || menge <= 0) { toast('⚠️ Bitte Menge eingeben'); mengeInp?.focus(); return; }
  if (!kunde) { toast('⚠️ Bitte Kunde eingeben'); kundeInp?.focus(); return; }

  const lsAktuell = getLsBestand(pid);
  if (lsAktuell === null) { toast('⚠️ Erst Inventur in Verwaltung durchführen!'); return; }

  // Entnahme: prüfen ob genug vorhanden
  if (!istEingang && lsAktuell - menge < 0) {
    toast(`⛔ Nicht möglich! LS-Bestand: ${lsAktuell} kg, Entnahme: ${menge} kg`);
    return;
  }

  sync('syncing');
  try {
    // Eingang: Menge addieren, Entnahme: Menge subtrahieren
    const delta = istEingang ? menge : -menge;
    const neuerLsBestand = lsAktuell + delta;
    await lsBestandSetzen(pid, neuerLsBestand);
    const res = await api.post('lager_ls_austrag', {
      produkt_id: pid, menge_kg: Math.abs(menge) * (istEingang ? 1 : -1), kunde,
      kuerzel: meinKuerzel||null, ls_datum: lsDatum,
      ls_bestand_nach: neuerLsBestand
    });
    lsAustraege.unshift(res[0]);
    if (!kunden.find(k => k.name.toLowerCase() === kunde.toLowerCase())) {
      try { const kr = await api.post('lager_kunden', {name:kunde}); kunden.push(kr[0]); kunden.sort((a,b)=>a.name.localeCompare(b.name)); } catch(e) {}
    }
    if (mengeInp) mengeInp.value = '';
    if (datumInp) datumInp.value = '';
    if (kundeInp) kundeInp.value = '';
    sync('ok');
    renderLS(document.getElementById('lsSuche')?.value||'');
    renderDifferenz();
    const pname = produkte.find(p=>p.id===pid)?.name||'';
    toast(`📝 LS: ${istEingang?'+':'−'}${menge} kg ${pname} → ${kunde} (Rest: ${neuerLsBestand} kg)`);
  } catch(e) { sync('error'); toast('❌ '+e.message); }
}

async function lsAustragSpeichern() {
  const pid = document.getElementById('ls-produkt-id').value;
  const menge = parseFloat(document.getElementById('ls-menge').value);
  const kunde = document.getElementById('ls-kunde-input').value.trim();
  const lsDatum = document.getElementById('ls-datum').value || null;
  if (!pid) { toast('⚠️ Bitte Produkt auswählen'); return; }
  if (isNaN(menge) || menge <= 0) { toast('⚠️ Bitte Menge eingeben'); return; }
  if (!kunde) { toast('⚠️ Bitte Kunde eingeben'); return; }

  // Prüfen ob LS-Bestand vorhanden und ausreichend
  const lsAktuell = getLsBestand(pid);
  if (lsAktuell === null) {
    toast('⚠️ Bitte zuerst Inventur in Verwaltung durchführen!');
    return;
  }
  if (lsAktuell - menge < 0) {
    toast(`⛔ Nicht möglich: LS-Bestand würde negativ! Aktuell: ${lsAktuell} kg, Entnahme: ${menge} kg`);
    return;
  }

  sync('syncing');
  try {
    const neuerLsBestand = lsAktuell - menge;
    // LS-Bestand reduzieren
    await lsBestandSetzen(pid, neuerLsBestand);
    // Buchung loggen
    const res = await api.post('lager_ls_austrag', {
      produkt_id: pid, menge_kg: menge, kunde,
      kuerzel: meinKuerzel||null, ls_datum: lsDatum,
      ls_bestand_nach: neuerLsBestand
    });
    lsAustraege.unshift(res[0]);
    // Neuen Kunden anlegen
    if (!kunden.find(k => k.name.toLowerCase() === kunde.toLowerCase())) {
      try {
        const kr = await api.post('lager_kunden', { name: kunde });
        kunden.push(kr[0]);
        kunden.sort((a,b) => a.name.localeCompare(b.name));
      } catch(e) {}
    }
    document.getElementById('ls-produkt-id').value = '';
    document.getElementById('ls-produkt-input').value = '';
    document.getElementById('ls-menge').value = '';
    document.getElementById('ls-datum').value = '';
    document.getElementById('ls-kunde-input').value = '';
    sync('ok');
    renderLS();
    renderDifferenz();
    const pname = produkte.find(p=>p.id===pid)?.name||'';
    toast(`📝 LS Austrag: −${menge} kg ${pname} → ${kunde} (LS-Rest: ${neuerLsBestand} kg)`);
  } catch(e) { sync('error'); toast('❌ ' + e.message); }
}

// ══════════════════════════════════════════════════════════
// DIFFERENZ
// ══════════════════════════════════════════════════════════

function renderDifferenz(filterQ='', nurMitDiff=false) {
  const el = document.getElementById('differenzContent');
  if (!el) return;

  // Alle Produkte mit Inventur (LS-Bestand vorhanden) zeigen
  const alleNames = uniqueNames().filter(name => {
    if (filterQ && !norm(name).includes(norm(filterQ))) return false;
    const lagerKg = gesamtKg(name);
    const lsKg = getLsBestandName(name);
    if (lsKg === null && lagerKg === 0) return false; // noch nie erfasst
    if (nurMitDiff) {
      const diff = lagerKg - (lsKg || 0);
      return diff !== 0;
    }
    return lagerKg > 0 || lsKg !== null;
  });

  el.innerHTML = `
    <div class="search-wrap" style="margin-top:12px;">
      <span class="search-icon">🔍</span>
      <input type="search" class="search-input" id="differenzSuche" value="${filterQ}"
        oninput="renderDifferenz(this.value, document.getElementById('diffFilterBtn').dataset.active==='1')"
        placeholder="Produkt suchen…"
        data-focus="1">
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px;">
      <button id="diffFilterBtn" data-active="${nurMitDiff?'1':'0'}"
        onclick="this.dataset.active=this.dataset.active==='1'?'0':'1'; renderDifferenz(document.getElementById('differenzSuche').value, this.dataset.active==='1')"
        style="padding:6px 14px;border-radius:20px;border:1px solid ${nurMitDiff?'#fff':'rgba(255,255,255,0.4)'};background:${nurMitDiff?'#fff':'rgba(255,255,255,0.15)'};color:${nurMitDiff?'var(--surface2)':'#fff'};font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:0.5px;cursor:pointer;">
        ⚠️ Nur mit Differenz
      </button>
    </div>
    <div style="background:#e0f2fe;border:1px solid #7dd3fc;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:#1e3a5f;">
      ℹ️ <strong>Außendienst</strong> = Lagerbestand aus Produkt-Buchungen · <strong>Innendienst</strong> = Summe LS Austraege · Rot = Differenz vorhanden
    </div>

    ${alleNames.length ? alleNames.map(name => {
      const lagerKg = gesamtKg(name);
      // Echter LS-Bestand aus lager_ls_bestand Tabelle
      const lsKg = getLsBestandName(name) ?? 0;
      const differenz = lagerKg - lsKg;
      const hatDiff = differenz !== 0;
      const cardBorder = hatDiff ? '2px solid #fca5a5' : '1px solid #bae6fd';
      const barColor = hatDiff ? '#b91c1c' : '#7dd3fc';
      const diffColor = differenz > 0 ? '#b45309' : differenz < 0 ? '#b91c1c' : '#15803d';
      const diffBg = differenz > 0 ? '#fffbeb' : differenz < 0 ? '#fef2f2' : '#f0fdf4';
      const diffBorder = differenz > 0 ? '#fcd34d' : differenz < 0 ? '#fca5a5' : '#86efac';
      // Letzte 5 LS-Einträge für dieses Produkt
      const lsEntries = lsAustraege.filter(ls => {
        const p = produkte.find(p=>p.id===ls.produkt_id);
        return p && p.name === name;
      }).slice(0,5);

      return `<div style="background:#fff;border:${cardBorder};border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.10);margin-bottom:10px;">
        <div style="height:3px;background:${barColor};"></div>
        <div style="padding:12px 14px;border-bottom:1px solid #e0f2fe;">

          <!-- Produktname groß -->
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:20px;color:#0f172a;margin-bottom:10px;">${name}</div>

          <!-- Differenz prominent -->
          <div style="background:${diffBg};border:2px solid ${diffBorder};border-radius:8px;padding:10px;text-align:center;margin-bottom:8px;">
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:${hatDiff?diffColor:'#64748b'};margin-bottom:4px;">
              Außendienst − Innendienst = Differenz
            </div>
            <div style="font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:${diffColor};">
              ${lagerKg} − ${lsKg} = ${differenz>0?'+':''}${differenz} kg
            </div>
            <div style="font-size:11px;color:#64748b;margin-top:4px;">
              ${differenz > 0 ? '⚠️ '+differenz+' kg mehr im Lager als auf LS verbucht — LS fehlt!' : differenz < 0 ? '🔴 '+Math.abs(differenz)+' kg mehr auf LS als im Lager — Fehler!' : '✅ Lager und LS stimmen überein'}
            </div>
          </div>

          <!-- Aufschlüsselung nach Gebindegröße -->
          <div style="display:flex;flex-direction:column;gap:6px;">
            ${prodsFor(name).map(p => {
              const adKg = getMenge(p.id,'Garage') + getMenge(p.id,'Werkstatt');
              const lsP = getLsBestand(p.id) ?? 0;
              const diffP = adKg - lsP;
              const diffCol = diffP > 0 ? '#b45309' : diffP < 0 ? '#b91c1c' : '#15803d';
              const garKg = getMenge(p.id,'Garage');
              const werKg = getMenge(p.id,'Werkstatt');
              return `<div style="display:grid;grid-template-columns:auto 1fr 1fr auto;gap:6px;align-items:center;background:#f8fafc;border:1px solid #e0f2fe;border-radius:8px;padding:8px 10px;">
                <span style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:1px;color:#475569;white-space:nowrap;">${p.gebinde_kg}kg</span>
                <div style="text-align:center;">
                  <div style="font-family:'DM Mono',monospace;font-size:14px;color:var(--surface2);">${adKg} kg</div>
                  <div style="font-size:9px;color:#94a3b8;">📦 ${garKg?'G:'+garKg:''}${garKg&&werKg?' / ':''}${werKg?'W:'+werKg:''}</div>
                </div>
                <div style="text-align:center;">
                  <div style="font-family:'DM Mono',monospace;font-size:14px;color:#b91c1c;">${lsP} kg</div>
                  <div style="font-size:9px;color:#94a3b8;">📝 LS</div>
                </div>
                <div style="text-align:right;">
                  <div style="font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:${diffCol};">${diffP>0?'+':''}${diffP}</div>
                  <div style="font-size:9px;color:#94a3b8;">Diff</div>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>

        ${lsEntries.length ? `
        <div style="padding:10px 14px;">
          <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:#64748b;text-transform:uppercase;margin-bottom:6px;">LS Einträge</div>
          ${lsEntries.map(ls => {
            const eingetragen = fmtDatum(ls.erstellt_am);
            const lsDat = ls.ls_datum ? fmtDatumKurz(ls.ls_datum) : null;
            return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f1f5f9;">
              <span style="font-family:'DM Mono',monospace;font-size:13px;color:#b91c1c;min-width:60px;">−${ls.menge_kg} kg</span>
              <span style="flex:1;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:#0f172a;">${ls.kunde}</span>
              <span style="font-family:'DM Mono',monospace;font-size:10px;color:#94a3b8;text-align:right;">${eingetragen}${lsDat?'<br>LS: '+lsDat:''}${ls.kuerzel?' · '+ls.kuerzel:''}</span>
            </div>`;
          }).join('')}
        </div>` : ''}
      </div>`;
    }).join('') : '<div class="empty">Keine Einträge vorhanden</div>'}
  `;
  // Suchfeld-Fokus wiederherstellen
  if (filterQ !== '') {
    setTimeout(() => {
      const sf = document.getElementById('differenzSuche');
      if (sf) { sf.focus(); sf.setSelectionRange(sf.value.length, sf.value.length); }
    }, 0);
  }
}
