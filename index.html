<style>
:root {
  --bg: #0ea5e9;
  --surface: #0284c7;
  --surface2: #0369a1;
  --border: #38bdf8;
  --ok: #15803d;
  --warn: #b45309;
  --err: #b91c1c;
  --text: #0f172a;
  --muted: #1e3a5f;
  --input-bg: #f0f9ff;
  --header-h: 56px;
  --tabs-h: 42px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: var(--header-h); background: var(--surface2);
  border-bottom: 1px solid var(--surface);
  padding: 0 14px; display: flex; align-items: center; gap: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.logo { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: 1px; color: #fff; }
.logo span { color: #bae6fd; font-weight: 400; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; margin-left: auto; flex-shrink: 0; }
.sync-dot.syncing { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; animation: pulse 1s infinite; }
.sync-dot.error { background: #f87171; box-shadow: 0 0 6px #f87171; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.tabs {
  position: fixed; top: var(--header-h); left: 0; right: 0; z-index: 190;
  height: var(--tabs-h); background: var(--surface);
  border-bottom: 1px solid var(--surface2);
  display: flex; overflow-x: auto; scrollbar-width: none; align-items: stretch;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; display: flex; align-items: center; gap: 6px;
  padding: 0 16px; font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; font-size: 14px; letter-spacing: 0.5px; color: #bae6fd;
  border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap;
  transition: all .15s; border: none; background: none;
}
.tab:hover { color: #fff; }
.tab.active { color: #fff; border-bottom-color: #fff; }

.scroll-area { position: fixed; top: calc(var(--header-h) + var(--tabs-h)); bottom: 0; left: 0; right: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.view { display: none; padding: 12px 12px 100px; }
.view.active { display: block; }

.sl { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #0f172a; margin: 14px 0 8px; display: flex; align-items: center; gap: 10px; }
.sl::after { content: ''; flex: 1; height: 1px; background: #7dd3fc; }

.card { background: #fff; border: 1px solid #bae6fd; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.10); margin-bottom: 10px; }
.card-title { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--surface2); padding: 9px 14px; background: #e0f2fe; border-bottom: 1px solid #bae6fd; }
.card-body { padding: 14px; }

.search-wrap { position: relative; margin-bottom: 10px; }
.search-input { width: 100%; background: #fff; border: 2px solid #7dd3fc; border-radius: 8px; padding: 11px 14px 11px 38px; font-family: 'Barlow', sans-serif; font-size: 15px; color: var(--text); outline: none; transition: border-color .15s; }
.search-input:focus { border-color: var(--surface2); box-shadow: 0 0 0 2px #bae6fd; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }

.filter-row { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.filter-row::-webkit-scrollbar { display: none; }
.fpill { white-space: nowrap; padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.15); font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; color: #fff; cursor: pointer; transition: all .15s; }
.fpill.active { background: #fff; color: var(--surface2); border-color: #fff; }
.fpill.fp-garage.active { background: #0284c7; color: #fff; border-color: #0284c7; }
.fpill.fp-werkstatt.active { background: #d97706; color: #fff; border-color: #d97706; }
.fpill.fp-warn.active { background: #fef2f2; color: var(--err); border-color: #fca5a5; }

/* PRODUKT CARD */

.pc.pc-warn { border-color: #fcd34d; }
.pc-bar { height: 3px; background: #7dd3fc; }

.pc-header { padding: 12px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
.pc-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 20px; color: var(--text); flex: 1; }

/* TOAST */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface2); color: #fff; border: 1px solid #7dd3fc; padding: 12px 20px; border-radius: 8px; font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 500; z-index: 999; transition: transform 0.3s; white-space: nowrap; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
.toast.show { transform: translateX(-50%) translateY(0); }

.empty { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.75); font-size: 14px; }

<script>
  // Service Worker registrieren für Auto-Updates
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      // Cache-Buster: zwingt Browser die sw.js neu zu laden
      navigator.serviceWorker.register('./sw.js?v=8').then(reg => {
        // Alle 60 Minuten auf Updates prüfen
        setInterval(() => reg.update(), 60 * 60 * 1000);
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // Neues Update verfügbar – Toast zeigen
              showUpdateBanner();
            }
          });
        });
      });
    });
    // Nach Aktivierung neu laden
    navigator.serviceWorker.addEventListener('controllerchange', () => location.reload());
  }
  function showUpdateBanner() {
    const b = document.getElementById('updateBanner');
    if (b) b.style.display = 'flex';
  }
</script>

<script>
// ══════════════════════════════════════════════════════════
// API HELPER
// ══════════════════════════════════════════════════════════
const api = {
  h() { return { apikey: SUPABASE_KEY, Authorization: `Bearer ${authToken || SUPABASE_KEY}`, 'Content-Type': 'application/json' }; },
  async get(table, qs='') {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${qs}`, { headers: this.h() });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async post(table, data) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method:'POST', headers:{...this.h(), Prefer:'return=representation'}, body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async upsert(table, data, onConflict='produkt_id,lagerort') {
    // Erst prüfen ob Eintrag existiert
    const check = await fetch(
      `${SUPABASE_URL}/rest/v1/${table}?produkt_id=eq.${data.produkt_id}&lagerort=eq.${data.lagerort}`,
      { headers: this.h() }
    );
    const existing = await check.json();
    if (existing && existing.length > 0) {
      // UPDATE
      const r = await fetch(
        `${SUPABASE_URL}/rest/v1/${table}?produkt_id=eq.${data.produkt_id}&lagerort=eq.${data.lagerort}`,
        { method:'PATCH', headers:{...this.h(), Prefer:'return=minimal'}, body: JSON.stringify(data) }
      );
      if (!r.ok) throw new Error(await r.text());
    } else {
      // INSERT
      const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
        method:'POST', headers:{...this.h(), Prefer:'return=minimal'}, body: JSON.stringify(data)
      });
      if (!r.ok) throw new Error(await r.text());
    }
  }
};

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let produkte = [], bestaende = [], buchungen = [], userKuerzel = [];
let aktFilter = 'alle';
let meinKuerzel = '';
let meineUserId = null;

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
async function init() {
  sync('syncing');
  try {
    // User-ID aus Token lesen
    try {
      const payload = JSON.parse(atob(authToken.split('.')[1]));
      meineUserId = payload.sub;
    } catch(e) {}

    [produkte, bestaende, buchungen, userKuerzel] = await Promise.all([
      api.get('lager_produkte','order=name.asc,gebinde_kg.desc'),
      api.get('lager_bestand','order=lagerort.asc'),
      api.get('lager_buchungen','order=erstellt_am.desc&limit=150'),
      api.get('lager_user_kuerzel','order=kuerzel.asc')
    ]);
    // Eigenes Kürzel setzen
    const meins = userKuerzel.find(u => u.user_id === meineUserId);
    meinKuerzel = meins ? meins.kuerzel : '';
    sync('ok');
    renderProdukte(); renderUebersicht(); renderLog();
  } catch(e) { sync('error'); toast('❌ Verbindungsfehler: ' + e.message); }
}

function sync(s) {
  const d = document.getElementById('syncDot');
  d.className = 'sync-dot' + (s !== 'ok' ? ' ' + s : '');
}

// ══════════════════════════════════════════════════════════
// TABS / FILTER
// ══════════════════════════════════════════════════════════
function setTab(id, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  btn.classList.add('active');
}
function setFilter(f, btn) {
  aktFilter = f;
  document.querySelectorAll('.fpill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderProdukte();
}

// ══════════════════════════════════════════════════════════
// HELFER
// ══════════════════════════════════════════════════════════
const iqq = (s) => s.replace(/[\s\/\.]/g,'_'); // ID-safe string
function getMenge(pid, lo) {
  const b = bestaende.find(b => b.produkt_id === pid && b.lagerort === lo);
  return b ? Number(b.menge_kg) : 0;
}
function uniqueNames() { return [...new Set(produkte.map(p => p.name))]; }
function prodsFor(name) { return produkte.filter(p => p.name === name); }
function gesamtKg(name) {
  const ids = prodsFor(name).map(p => p.id);
  return bestaende.filter(b => ids.includes(b.produkt_id)).reduce((s,b) => s + Number(b.menge_kg), 0);
}
function richtwert(name) {
  // Gesamt-Richtwert: Summe aller Gebinde-Richtwerte
  const rws = prodsFor(name).map(p => Number(p.richtwert_kg)||0);
  const sum = rws.reduce((s,v)=>s+v,0);
  return sum > 0 ? sum : null;
}
function richtwertProd(pid) {
  // Richtwert einer einzelnen Gebindegröße
  const p = produkte.find(p=>p.id===pid);
  return p && p.richtwert_kg ? Number(p.richtwert_kg) : null;
}
function loKg(name, lo) {
  const ids = prodsFor(name).map(p => p.id);
  return bestaende.filter(b => ids.includes(b.produkt_id) && b.lagerort === lo).reduce((s,b) => s + Number(b.menge_kg), 0);
}

// ══════════════════════════════════════════════════════════
// BUCHEN
// ══════════════════════════════════════════════════════════
async function buchen(pid, lo, delta, notiz='') {
  sync('syncing');
  try {
    const neu = Math.max(0, getMenge(pid, lo) + Number(delta));
    await api.upsert('lager_bestand', {
      produkt_id: pid, lagerort: lo, menge_kg: neu,
      aktualisiert_am: new Date().toISOString()
    });
    await api.post('lager_buchungen', { produkt_id: pid, lagerort: lo, menge_kg: delta, notiz: notiz||null, kuerzel: meinKuerzel||null });
    const idx = bestaende.findIndex(b => b.produkt_id===pid && b.lagerort===lo);
    if (idx>=0) bestaende[idx].menge_kg = neu;
    else bestaende.push({ produkt_id:pid, lagerort:lo, menge_kg:neu });
    buchungen.unshift({ produkt_id:pid, lagerort:lo, menge_kg:delta, notiz, kuerzel:meinKuerzel||null, erstellt_am:new Date().toISOString() });
    sync('ok');
    renderProdukte(); renderUebersicht(); renderLog();
    const pname = produkte.find(p => p.id===pid)?.name||'';
    toast(`${delta>0?'➕':'➖'} ${Math.abs(delta)} kg · ${pname} · ${lo}`);
  } catch(e) { sync('error'); toast('❌ ' + e.message); }
}

// ══════════════════════════════════════════════════════════
// RENDER PRODUKTE
// ══════════════════════════════════════════════════════════
function renderProdukte() {
  const raw = document.getElementById('searchInput').value.trim();
  const el = document.getElementById('produktListe');
  // Scroll-Position und offene Karten merken
  const scrollEl = document.querySelector('.scroll-area');
  const scrollTop = scrollEl ? scrollEl.scrollTop : 0;
  const offene = [...document.querySelectorAll('.pc.open')].map(c => c.id);
  // Normalisierung: Leerzeichen, Bindestriche, Punkte entfernen -> bz300 = BZ 300 = bz-300
  const norm = s => s.toLowerCase().split(' ').join('').split('-').join('').split('.').join('').split('_').join('');
  const q = norm(raw);

  const names = uniqueNames().filter(name => {
    if (q && !norm(name).includes(q)) return false;
    if (aktFilter === 'garage') return loKg(name,'Garage') > 0;
    if (aktFilter === 'werkstatt') return loKg(name,'Werkstatt') > 0;
    if (aktFilter === 'niedrig') { const rw=richtwert(name); return rw && gesamtKg(name) < rw*0.5; }
    return true;
  });

  if (!names.length) { el.innerHTML='<div class="empty">Keine Produkte gefunden</div>'; return; }

  el.innerHTML = names.map(name => {
    const gkg = gesamtKg(name);
    const rw = richtwert(name);
    const pct = rw ? gkg/rw : 1;
    const barCls = pct < 0.3 ? 'bl' : pct < 0.5 ? 'bw' : '';
    const cardCls = pct < 0.3 ? 'pc-low' : pct < 0.5 ? 'pc-warn' : '';

    const prods = prodsFor(name);
    // Ein Chip pro Gebindegröße × Lagerort wo Bestand > 0
    const chips = prods.flatMap(p => {
      const rwP = richtwertProd(p.id);
      return ['Garage','Werkstatt'].map(lo => {
        const kg = getMenge(p.id, lo);
        if (!kg) return '';
        const kan = (kg / p.gebinde_kg).toFixed(1);
        const rwTxt = rwP ? ` · RW ${rwP}kg` : '';
        return `<span class="lchip ${lo.toLowerCase()}">
          <span class="lchip-dot"></span>${lo==='Garage'?'🔵':'🟡'} ${p.gebinde_kg}kg: ${kg}kg${rwTxt}
        </span>`;
      });
    }).join('');

    const rows = prodsFor(name).flatMap(p =>
      ['Garage','Werkstatt'].map(lo => {
        const kg = getMenge(p.id, lo);
        const kan = p.gebinde_kg ? (kg/p.gebinde_kg).toFixed(1) : '–';
        const sid = `${iqq(p.id)}_${lo}`;
        return `<div class="gebinde-row">
          <div class="gebinde-top">
            <span class="gebinde-size-label">${p.gebinde_kg} kg Gebinde</span>
            <span class="lort-badge ${lo.toLowerCase()}">${lo==='Garage'?'🔵':'🟡'} ${lo}</span>
          </div>
          <div class="gebinde-mid">
            <div class="menge-display">
              <div class="menge-kg">${kg} <span style="font-size:14px;color:var(--muted)">kg</span></div>
              <div class="menge-sub">${kan} Gebinde à ${p.gebinde_kg} kg</div>
            </div>
            <div class="counter-group">
              <button class="cbtn minus" onclick="qb('${p.id}','${lo}',-${p.gebinde_kg},event)">−</button>
              <button class="cbtn plus"  onclick="qb('${p.id}','${lo}',+${p.gebinde_kg},event)">+</button>
            </div>
          </div>
          <div class="manual-row">
            <button id="sign_${sid}" onclick="toggleSign('${sid}')"
              style="width:42px;height:42px;border-radius:8px;border:1px solid #fca5a5;background:#fef2f2;color:#b91c1c;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;cursor:pointer;flex-shrink:0;">−</button>
            <input type="number" class="manual-inp" id="m_${sid}" placeholder="Gebinde" step="1" min="0"
              style="text-align:center;">
            <input type="text" class="note-inp" id="n_${sid}" placeholder="Notiz (Kunde…)">
            <button class="btn-ok" onclick="mb('${p.id}','${lo}','${sid}',${p.gebinde_kg})">OK</button>
          </div>
        </div>`;
      })
    ).join('');

    return `<div class="pc ${cardCls}" id="pc_${iqq(name)}">
      <div class="pc-bar ${barCls}"></div>
      <div class="pc-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="pc-name">${name}</div>
        <div>
          <div class="pc-total-kg">${gkg} kg</div>
          ${rw?`<div class="pc-total-rw">Richtwert: ${rw} kg</div>`:''}
        </div>
        <span class="chev">▼</span>
      </div>
      <div class="chip-row">
        ${chips||'<span style="font-size:12px;color:#94a3b8">Noch kein Bestand – aufklappen zum Einbuchen</span>'}
      </div>
      <div class="pc-detail">${rows}</div>
    </div>`;
  }).join('');
  // Offene Karten nach Re-Render wiederherstellen
  setTimeout(() => {
    offene.forEach(id => {
      const c = document.getElementById(id);
      if (c) c.classList.add('open');
    });
    // Scroll-Position wiederherstellen
    if (scrollEl) scrollEl.scrollTop = scrollTop;
  }, 0);
}

async function qb(pid,lo,delta,e) { e.stopPropagation(); await buchen(pid,lo,delta); }
function toggleSign(sid) {
  const btn = document.getElementById('sign_'+sid);
  if (!btn) return;
  if (btn.textContent === '−') {
    btn.textContent = '+';
    btn.style.background = '#f0fdf4';
    btn.style.borderColor = '#86efac';
    btn.style.color = '#15803d';
  } else {
    btn.textContent = '−';
    btn.style.background = '#fef2f2';
    btn.style.borderColor = '#fca5a5';
    btn.style.color = '#b91c1c';
  }
}

async function mb(pid,lo,sid,gebinde) {
  const inp=document.getElementById('m_'+sid);
  const noteInp=document.getElementById('n_'+sid);
  const signBtn=document.getElementById('sign_'+sid);
  const anzahl=parseFloat(inp.value);
  if(isNaN(anzahl)||anzahl<=0){toast('⚠️ Bitte Anzahl Gebinde eingeben');return;}
  const isNeg = !signBtn || signBtn.textContent === '−';
  const deltaKg = (isNeg ? -1 : 1) * anzahl * gebinde;
  const notiz=noteInp?.value.trim()||'';
  inp.value=''; if(noteInp) noteInp.value='';
  await buchen(pid,lo,deltaKg,notiz);
}

function openModal() { document.getElementById('modalNeu').classList.add('open'); }
function closeModal() { document.getElementById('modalNeu').classList.remove('open'); }

async function speichereNeuesProdukt() {
  const name = document.getElementById('neu-name').value.trim();
  const geb = parseInt(document.getElementById('neu-gebinde').value);
  const rw = parseFloat(document.getElementById('neu-richtwert').value)||null;
  if(!name||!geb){toast('⚠️ Name und Gebindegröße erforderlich');return;}
  sync('syncing');
  try {
    const res = await api.post('lager_produkte', {name, gebinde_kg:geb, richtwert_kg:rw});
    produkte.push(res[0]);
    produkte.sort((a,b)=>a.name.localeCompare(b.name));
    sync('ok'); closeModal();
    ['neu-name','neu-gebinde','neu-richtwert'].forEach(id=>document.getElementById(id).value='');
    renderProdukte();
    toast('✅ Produkt angelegt: ' + name);
  } catch(e){sync('error');toast('❌ '+e.message);}
}

// ══════════════════════════════════════════════════════════
// ÜBERSICHT
// ══════════════════════════════════════════════════════════
function renderUebersicht() {
  const el = document.getElementById('uebersichtContent');
  const gKg = bestaende.filter(b=>b.lagerort==='Garage').reduce((s,b)=>s+Number(b.menge_kg),0);
  const wKg = bestaende.filter(b=>b.lagerort==='Werkstatt').reduce((s,b)=>s+Number(b.menge_kg),0);
  // Niedrig: prüfe ob irgendeine Gebindegröße unter 50% ihres Richtwerts ist
  const niedrig = uniqueNames().filter(name => {
    return prodsFor(name).some(p => {
      const rw = richtwertProd(p.id);
      if (!rw) return false;
      const kg = ['Garage','Werkstatt'].reduce((s,lo)=>s+getMenge(p.id,lo),0);
      return kg < rw * 0.5;
    });
  });

  el.innerHTML = `
    <div class="sl" style="margin-top:14px">Lagerübersicht</div>
    <div class="stat-grid">
      <div class="stat-card" style="border-color:#7dd3fc">
        <div class="stat-label">🔵 Garage</div>
        <div class="stat-val" style="color:var(--surface2)">${gKg}</div>
        <div class="stat-sub">kg gesamt</div>
      </div>
      <div class="stat-card" style="border-color:#fcd34d">
        <div class="stat-label">🟡 Werkstatt</div>
        <div class="stat-val" style="color:var(--warn)">${wKg}</div>
        <div class="stat-sub">kg gesamt</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">📦 Produkte</div>
        <div class="stat-val">${uniqueNames().length}</div>
        <div class="stat-sub">erfasst</div>
      </div>
      <div class="stat-card" style="${niedrig.length?'border-color:#fca5a5':''}">
        <div class="stat-label">⚠️ Niedrig</div>
        <div class="stat-val" style="color:${niedrig.length?'var(--err)':'var(--ok)'}">${niedrig.length}</div>
        <div class="stat-sub">unter 50% Richtwert</div>
      </div>
    </div>

    ${niedrig.length ? `
    <div class="sl">⚠️ Nachbestellen</div>
    <div class="card"><div class="card-body">
      ${niedrig.map(name=>{
        const kg=gesamtKg(name), rw=richtwert(name), pct=Math.round(kg/rw*100);
        return `<div class="rr"><span class="rl">${name}</span>
          <span class="rv err">${kg} kg <span style="color:#94a3b8;font-size:11px">/ ${rw} kg (${pct}%)</span></span></div>`;
      }).join('')}
    </div></div>` : `
    <div class="sl">Status</div>
    <div class="card"><div class="card-body" style="text-align:center;padding:20px;color:var(--ok);font-weight:600">
      ✅ Alle Bestände im grünen Bereich
    </div></div>`}

    <div class="sl">Alle Produkte</div>
    <div class="card"><div class="card-body">
      ${uniqueNames().map(name=>{
        const kg=gesamtKg(name), rw=richtwert(name);
        const isLow=rw&&kg<rw*0.5;
        const gk=loKg(name,'Garage'), wk=loKg(name,'Werkstatt');
        return `<div class="rr">
          <div class="rl">${name}
            <div style="margin-top:2px;display:flex;gap:8px">
              ${gk>0?`<span style="font-size:10px;color:var(--surface2)">🔵 ${gk} kg</span>`:''}
              ${wk>0?`<span style="font-size:10px;color:var(--warn)">🟡 ${wk} kg</span>`:''}
            </div>
          </div>
          <span class="rv ${isLow?'err':''}">${kg} kg</span>
        </div>`;
      }).join('')}
    </div></div>
  `;
}

  el.innerHTML = '<div style="margin-top:12px">' + buchungen.map(b=>{

            <span style="font-size:11px;color:#64748b;font-family:'DM Mono',monospace;">Richtwert:</span>
            <input type="number" id="${rwsid}" value="${rwP||\'\'}" placeholder="–"
              style="width:75px;background:#fff;border:1px solid #7dd3fc;border-radius:6px;padding:5px 7px;font-family:'DM Mono',monospace;font-size:13px;color:#0f172a;outline:none;text-align:right;">
            <span style="font-size:11px;color:#64748b;font-family:'DM Mono',monospace;">kg</span>
            <button onclick="speichereRichtwert('${p.id}','${rwsid}')"
              style="background:#475569;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;cursor:pointer;">RW</button>
          </div>
          ${lagerorte}
        </div>`;
      }).join('');

      return `<div class="card" style="margin-bottom:10px;">
        <div style="height:3px;${barCls};border-radius:10px 10px 0 0;"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px;background:#f0f9ff;border-bottom:1px solid #e0f2fe;">
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:#0f172a;">${name}</div>
          <div style="text-align:right;">
            <div style="font-family:'DM Mono',monospace;font-size:15px;font-weight:500;">${gkg} kg</div>
            ${rw?`<div style="font-size:10px;color:#64748b">Richtwert: ${rw} kg</div>`:''}
          </div>
        </div>
        ${zeilen}
      </div>`;
    }).join('') : '<div style="text-align:center;padding:30px;color:rgba(255,255,255,0.7)">Keine Produkte gefunden</div>'}

    <!-- Techniker-Kürzel -->
    <div class="sl">Techniker-Kürzel</div>
    <div style="background:#e0f2fe;border:1px solid #7dd3fc;border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:13px;color:#1e3a5f;font-family:'Barlow',sans-serif;">
      ℹ️ Kürzel erscheinen im Log bei jeder Buchung. User-ID findest du in Supabase → Authentication → Users.
    </div>
    <div class="card">
      <div class="card-title">Kürzel verwalten</div>
      <div class="card-body" style="padding:0">
        ${userKuerzel.map(u => `
          <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #e0f2fe;">
            <div style="flex:1;">
              <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;">${u.kuerzel}</div>
              <div style="font-family:'DM Mono',monospace;font-size:11px;color:#64748b;">${u.name||''}</div>
            </div>
            <button onclick="loescheKuerzel('${u.id}')"
              style="background:#fef2f2;color:#b91c1c;border:1px solid #fca5a5;border-radius:6px;padding:6px 10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;cursor:pointer;">✕</button>
          </div>`).join('')}
        <!-- Neues Kürzel -->
        <div style="padding:12px 14px;background:#f8fafc;">
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
            <input type="text" id="neu-kuerzel" placeholder="Kürzel (z.B. IG)"
              style="width:80px;background:#f0f9ff;border:1px solid #7dd3fc;border-radius:6px;padding:8px;font-family:'DM Mono',monospace;font-size:14px;outline:none;text-transform:uppercase;">
            <input type="text" id="neu-kuerzel-name" placeholder="Name (optional)"
              style="flex:1;min-width:120px;background:#f0f9ff;border:1px solid #7dd3fc;border-radius:6px;padding:8px;font-family:'Barlow',sans-serif;font-size:14px;outline:none;">
            <input type="text" id="neu-kuerzel-uid" placeholder="User-ID (aus Supabase)"
              style="flex:2;min-width:200px;background:#f0f9ff;border:1px solid #7dd3fc;border-radius:6px;padding:8px;font-family:'DM Mono',monospace;font-size:12px;outline:none;">
            <button onclick="speichereKuerzel()"
              style="background:#0369a1;color:#fff;border:none;border-radius:6px;padding:8px 14px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;cursor:pointer;">＋ Hinzufügen</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

async function speichereKuerzel() {
  const kuerzel = document.getElementById('neu-kuerzel').value.trim().toUpperCase();
  const name = document.getElementById('neu-kuerzel-name').value.trim();
  const uid = document.getElementById('neu-kuerzel-uid').value.trim();
  if (!kuerzel || !uid) { toast('⚠️ Kürzel und User-ID erforderlich'); return; }
  sync('syncing');
  try {
    const res = await api.post('lager_user_kuerzel', { kuerzel, name: name||null, user_id: uid });
    userKuerzel.push(res[0]);
    sync('ok');
    renderVerwaltung(document.getElementById('verwaltungSuche')?.value||'');
    toast('✅ Kürzel angelegt: ' + kuerzel);
  } catch(e) { sync('error'); toast('❌ ' + e.message); }
}

async function loescheKuerzel(id) {
  sync('syncing');
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/lager_user_kuerzel?id=eq.${id}`, {
      method:'DELETE', headers: api.h()
    });
    userKuerzel = userKuerzel.filter(u => u.id !== id);
    sync('ok');
    renderVerwaltung(document.getElementById('verwaltungSuche')?.value||'');
    toast('🗑️ Kürzel gelöscht');
  } catch(e) { sync('error'); toast('❌ ' + e.message); }
}

async function setzeIstBestand(pid, lo, vsid) {
  const inp = document.getElementById('ist_' + vsid);
  const val = parseFloat(inp.value);
  if (isNaN(val) || val < 0) { toast('⚠️ Bitte gültigen kg-Wert eingeben'); return; }
  sync('syncing');
  try {
    // Direktes Setzen des Bestands (kein Delta — Korrektur/Inventur)
    await api.upsert('lager_bestand', {
      produkt_id: pid, lagerort: lo, menge_kg: val,
      aktualisiert_am: new Date().toISOString()
    });
    // Auch als Buchung loggen (Inventur/Korrektur)
    const alt = getMenge(pid, lo);
    const delta = val - alt;
    if (delta !== 0) {
      await api.post('lager_buchungen', {
        produkt_id: pid, lagerort: lo, menge_kg: delta,
        notiz: 'Inventur/Korrektur', kuerzel: meinKuerzel||null
      });
      buchungen.unshift({ produkt_id:pid, lagerort:lo, menge_kg:delta, notiz:'Inventur/Korrektur', kuerzel:meinKuerzel||null, erstellt_am:new Date().toISOString() });
    }
    // Lokalen State updaten
    const idx = bestaende.findIndex(b => b.produkt_id===pid && b.lagerort===lo);
    if (idx>=0) bestaende[idx].menge_kg = val;
    else bestaende.push({ produkt_id:pid, lagerort:lo, menge_kg:val });
    inp.value = '';
    sync('ok');
    const pname = produkte.find(p=>p.id===pid)?.name||'';
    renderVerwaltung(document.getElementById('verwaltungSuche')?.value||'');
    renderProdukte(); renderUebersicht(); renderLog();
    toast(`✅ ${pname} ${lo}: ${val} kg gesetzt`);
  } catch(e) { sync('error'); toast('❌ ' + e.message); }
}

async function speichereRichtwert(pid, sid) {
  // Richtwert pro einzelner Gebindegröße speichern
  const inp = document.getElementById('rw_' + sid);
  const val = parseFloat(inp.value) || null;
  sync('syncing');
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/lager_produkte?id=eq.${pid}`, {
      method: 'PATCH',
      headers: { ...api.h(), Prefer: 'return=minimal' },
      body: JSON.stringify({ richtwert_kg: val })
    });
    const p = produkte.find(p => p.id === pid);
    if (p) p.richtwert_kg = val;
    sync('ok');
    renderVerwaltung(document.getElementById('verwaltungSuche')?.value||'');
    renderUebersicht();
    const pname = p ? p.name + ' ' + p.gebinde_kg + 'kg' : '';
    toast(`✅ Richtwert ${pname}: ${val ? val + ' kg' : 'entfernt'}`);
  } catch(e) { sync('error'); toast('❌ ' + e.message); }
}

// ══════════════════════════════════════════════════════════
// AUTH – Login / Session
// ══════════════════════════════════════════════════════════
let authToken = null;

function showLogin() {
  const ls = document.getElementById('loginScreen'); ls.style.display = 'flex'; ls.style.alignItems = 'center'; ls.style.justifyContent = 'center';
}
function hideLogin() {
  document.getElementById('loginScreen').style.display = 'none';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  if (!email || !pw) { errEl.textContent = 'Bitte E-Mail und Passwort eingeben.'; errEl.style.display = 'block'; return; }
  try {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pw })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error_description || data.msg || 'Login fehlgeschlagen');
    authToken = data.access_token;
    // Token + Refresh Token speichern
    localStorage.setItem('lager_token', authToken);
    localStorage.setItem('lager_refresh', data.refresh_token);
    localStorage.setItem('lager_token_exp', Date.now() + (data.expires_in * 1000));
    hideLogin();
    await init();
    renderVerwaltung();
  } catch(e) {
    errEl.textContent = '❌ ' + e.message;
    errEl.style.display = 'block';
  }
}

async function checkSession() {
  const token = localStorage.getItem('lager_token');
  const refresh = localStorage.getItem('lager_refresh');
  const exp = parseInt(localStorage.getItem('lager_token_exp') || '0');

  if (token && Date.now() < exp) {
    // Token noch gültig
    authToken = token;
    hideLogin();
    await init();
    renderVerwaltung();
  } else if (refresh) {
    // Token abgelaufen aber Refresh Token vorhanden -> automatisch erneuern
    try {
      const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
        method: 'POST',
        headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ refresh_token: refresh })
      });
      const data = await r.json();
      if (!r.ok) throw new Error('Refresh fehlgeschlagen');
      authToken = data.access_token;
      localStorage.setItem('lager_token', authToken);
      localStorage.setItem('lager_refresh', data.refresh_token);
      localStorage.setItem('lager_token_exp', Date.now() + (data.expires_in * 1000));
      hideLogin();
      await init();
      renderVerwaltung();
    } catch(e) {
      // Refresh fehlgeschlagen -> neu einloggen
      localStorage.removeItem('lager_token');
      localStorage.removeItem('lager_refresh');
      localStorage.removeItem('lager_token_exp');
      showLogin();
    }
  } else {
    showLogin();
  }
}

function doLogout() {
  authToken = null;
  localStorage.removeItem('lager_token');
  localStorage.removeItem('lager_refresh');
  localStorage.removeItem('lager_token_exp');
  showLogin();
}


checkSession();
</script>
